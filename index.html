<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMSUNG SDI 안전 교육 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .sdi-blue { color: #00377B; }
        .bg-sdi-blue { background-color: #00377B; }
        .btn-sdi { background-color: #00377B; color: white; transition: background 0.2s; }
        .btn-sdi:hover { background-color: #002a5d; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .footer-text { font-size: 0.7rem; color: #94a3b8; text-align: center; padding: 1.5rem 0; }
        input[type="radio"]:checked + label { border-color: #00377B; background-color: #eff6ff; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="flex-grow container mx-auto max-w-md md:max-w-4xl p-4 flex flex-col justify-center">
        <!-- HEADER -->
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black sdi-blue tracking-tighter">SAMSUNG SDI</h1>
            <p class="text-xs font-bold text-slate-400">SAFETY FIRST · ULSAN</p>
        </header>

        <!-- 1. AUTH SECTION -->
        <section id="step-auth" class="card p-8 fade-in max-w-md mx-auto w-full">
            <h2 class="text-xl font-bold mb-6 text-center text-slate-800">교육생 본인 인증</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">성명</label>
                    <input type="text" id="user-name" placeholder="성명을 입력하세요" class="w-full border-2 border-slate-200 p-4 rounded-xl focus:border-blue-600 outline-none transition-all">
                </div>
                <button onclick="handleAuth()" class="w-full btn-sdi py-4 rounded-xl font-bold text-lg shadow-lg">평가 시작하기</button>
                <div class="pt-4 border-t border-slate-100 flex justify-center">
                    <button onclick="showAdminLogin()" class="text-xs text-slate-400 hover:text-slate-600 underline">관리자 모드 접속</button>
                </div>
            </div>
        </section>

        <!-- 2. QUIZ SECTION -->
        <section id="step-quiz" class="card p-6 hidden max-w-md mx-auto w-full">
            <div class="flex justify-between items-center mb-6">
                <div id="quiz-progress" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">Question 1 / 10</div>
                <button onclick="prevQuestion()" id="btn-back" class="text-xs font-bold text-slate-500 flex items-center hover:text-slate-800">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 이전으로
                </button>
            </div>
            <div class="mb-8">
                <h3 id="quiz-question" class="text-xl font-bold text-slate-800 leading-tight">질문을 불러오는 중...</h3>
            </div>
            <div id="quiz-options" class="space-y-3">
                <!-- Options injected here -->
            </div>
        </section>

        <!-- 3. RESULT SECTION -->
        <section id="step-result" class="card p-8 hidden text-center max-w-md mx-auto w-full">
            <div id="result-icon" class="mb-4"></div>
            <h2 class="text-2xl font-bold text-slate-800" id="result-title">평가 결과</h2>
            <div class="text-6xl font-black my-6 sdi-blue" id="result-score">0점</div>
            
            <div id="result-status-banner" class="p-4 rounded-xl mb-8 font-bold text-lg"></div>

            <!-- 이수 QR 영역 -->
            <div id="pass-qr-container" class="hidden mb-8 p-6 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                <p class="text-sm font-bold text-slate-500 mb-4 uppercase tracking-widest">이수 완료 인증 QR</p>
                <div id="qrcode" class="flex justify-center mb-4"></div>
                <p class="text-[10px] text-slate-400" id="qr-serial"></p>
            </div>

            <!-- 과락 안내 영역 -->
            <div id="fail-container" class="hidden mb-8">
                <p class="text-red-500 font-bold mb-2">총점 80점 미만으로 과락되었습니다.</p>
                <p class="text-sm text-slate-500 mb-4">재교육 이수 후 다시 응시해 주시기 바랍니다.</p>
                <p id="fail-attempts" class="text-xs font-bold text-red-600 bg-red-50 py-2 rounded-lg"></p>
            </div>

            <button onclick="goMain()" class="w-full bg-slate-100 text-slate-600 py-4 rounded-xl font-bold hover:bg-slate-200 transition">메인으로 돌아가기</button>
        </section>

        <!-- 4. ADMIN DASHBOARD (PC Optimized) -->
        <section id="step-admin-dash" class="card p-8 hidden max-w-4xl mx-auto w-full overflow-hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">관리자 대시보드</h2>
                    <p class="text-sm text-slate-500">삼성SDI 울산 사업장 현황 관리</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">Raw Data 추출 (Excel)</button>
                    <button onclick="goMain()" class="bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold">로그아웃</button>
                </div>
            </div>

            <!-- Stat Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="p-6 bg-blue-50 rounded-2xl border border-blue-100">
                    <p class="text-sm text-blue-600 font-bold mb-1">총 응시 건수</p>
                    <h4 id="stat-total" class="text-3xl font-black text-blue-900">0</h4>
                </div>
                <div class="p-6 bg-emerald-50 rounded-2xl border border-emerald-100">
                    <p class="text-sm text-emerald-600 font-bold mb-1">이수자 수</p>
                    <h4 id="stat-pass" class="text-3xl font-black text-emerald-900">0</h4>
                </div>
                <div class="p-6 bg-rose-50 rounded-2xl border border-rose-100">
                    <p class="text-sm text-rose-600 font-bold mb-1">평균 점수</p>
                    <h4 id="stat-avg" class="text-3xl font-black text-rose-900">0점</h4>
                </div>
            </div>

            <!-- Monthly Chart & Upload -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="card p-4 border border-slate-100 shadow-none">
                    <h5 class="text-sm font-bold mb-4">월별 이수 현황</h5>
                    <canvas id="monthlyChart" height="200"></canvas>
                </div>
                <div class="space-y-4">
                    <div class="p-4 bg-slate-50 rounded-xl">
                        <h5 class="text-sm font-bold mb-3">문제은행 관리</h5>
                        <button onclick="downloadExcelTemplate()" class="w-full text-xs bg-white border border-slate-200 p-2 rounded mb-2 hover:bg-slate-100 text-slate-600">📥 업로드 양식 다운로드</button>
                        <input type="file" id="file-upload" class="text-[10px] w-full mb-2" accept=".xlsx,.pdf,.txt">
                        <button onclick="alert('파일이 업로드되었습니다.')" class="w-full bg-slate-800 text-white py-2 rounded text-xs font-bold">파일 적용</button>
                    </div>
                    <button onclick="changeAdminPw()" class="w-full text-xs text-slate-400 py-2 border border-slate-100 rounded">관리자 비밀번호 변경</button>
                </div>
            </div>

            <!-- Response Table -->
            <div class="mt-8">
                <h5 class="text-lg font-bold mb-4 text-slate-800">응시 진행 현황 상세</h5>
                <div class="table-container border rounded-xl">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 font-bold text-slate-600">응시일</th>
                                <th class="p-4 font-bold text-slate-600">성명</th>
                                <th class="p-4 font-bold text-slate-600">점수</th>
                                <th class="p-4 font-bold text-slate-600">이수여부</th>
                                <th class="p-4 font-bold text-slate-600 text-center">응시횟수</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- ADMIN LOGIN -->
        <section id="step-admin-login" class="card p-8 hidden max-w-md mx-auto w-full">
            <h2 class="text-xl font-bold mb-6 text-center">관리자 인증</h2>
            <input type="password" id="admin-pw" placeholder="비밀번호 입력" class="w-full border-2 p-4 rounded-xl mb-4 outline-none focus:border-slate-800">
            <div class="flex gap-2">
                <button onclick="goMain()" class="flex-1 bg-slate-100 py-4 rounded-xl font-bold">취소</button>
                <button onclick="handleAdminLogin()" class="flex-1 bg-slate-800 text-white py-4 rounded-xl font-bold">로그인</button>
            </div>
        </section>

    </div>

    <footer class="footer-text">SAMSUNG SDI ULSAN</footer>

    <script>
        // --- DATA & STATE ---
        let adminPassword = "1234";
        let currentUserName = "";
        let currentUserId = "";
        let records = JSON.parse(localStorage.getItem('sdi_safety_v2_records') || '[]');
        let chartInstance = null;

        const quizPool = [
            { q: "전기화재 발생 시 가장 적절한 소화기는?", a: ["K급 소화기", "이산화탄소 소화기", "포말 소화기", "물 소화기"], r: 1 },
            { q: "LOTO(Lock Out Tag Out)는 언제 실시합니까?", a: ["작업 종료 후", "점심 시간", "정비 작업 전", "회의 시"], r: 2 },
            { q: "밀폐공간 작업 시 가장 먼저 확인해야 할 사항은?", a: ["공사 기한", "조명 밝기", "산소 농도", "통신 수단"], r: 2 },
            { q: "삼성SDI 5대 안전수칙이 아닌 것은?", a: ["보호구 착용", "임의 가동 금지", "LOTO 미준수", "작업허가 준수"], r: 2 },
            { q: "지게차 운행 시 시야가 확보되지 않으면 어떻게 해야 하나요?", a: ["빠르게 통과", "경적을 계속 울림", "유도자 배치 및 후진", "그냥 운행"], r: 2 },
            { q: "화학물질 취급 전 확인해야 하는 문서는?", a: ["일기예보", "MSDS(물질안전보건자료)", "출근부", "영수증"], r: 1 },
            { q: "안전모의 유효기간은 보통 얼마입니까?", a: ["1년", "2년", "5년", "제한없음"], r: 1 },
            { q: "정전기 방지를 위한 필수 장비는?", a: ["장갑", "제전복/제전화", "면마스크", "이어플러그"], r: 1 },
            { q: "중량물 들 때 올바른 자세는?", a: ["허리만 굽힌다", "무릎을 굽히고 허리를 편다", "반동을 이용한다", "팔만 사용한다"], r: 1 },
            { q: "응급상황 발생 시 가장 먼저 연락해야 할 곳은?", a: ["가족", "인근 병원", "현장 상황실/119", "동료"], r: 2 },
            { q: "고소 작업 시 안전대 체결 기준 높이는?", a: ["1.5m 이상", "2m 이상", "3m 이상", "5m 이상"], r: 1 },
            { q: "안전화의 주 목적은 무엇입니까?", a: ["패션 유지", "발 보호", "피로 방지", "통풍"], r: 1 },
            { q: "화재의 3요소가 아닌 것은?", a: ["가연물", "산소", "점화원", "이산화탄소"], r: 3 },
            { q: "보호구 미착용 작업 시 조치는?", a: ["즉시 중단 및 착용", "나중에 착용", "그냥 계속 작업", "동료가 빌려줌"], r: 0 },
            { q: "계단 이용 시 안전 수칙은?", a: ["뛰어내려가기", "난간 잡고 이용", "핸드폰 보며 걷기", "두 칸씩 오르기"], r: 1 },
            { q: "유해물질이 눈에 들어갔을 때 응급처치는?", a: ["비빈다", "흐르는 물에 15분 이상 씻는다", "안약을 넣는다", "그대로 둔다"], r: 1 },
            { q: "소화전 사용 시 노즐은 어디를 향하나?", a: ["천장", "화염의 뿌리", "연기 부분", "자기 발 앞"], r: 1 },
            { q: "추락방지용 안전대 설치 위치는?", a: ["발 밑", "허리 높이", "머리 위쪽 지지점", "아무데나"], r: 2 },
            { q: "안전점검의 가장 큰 목적은?", a: ["벌금 부과", "사고 예방", "시설물 감상", "인원 파악"], r: 1 },
            { q: "현장 내 금연 구역에서의 흡연은?", a: ["허용됨", "안전수칙 위반", "조심하면 됨", "화장실에선 됨"], r: 1 }
        ];

        let selectedQuiz = [];
        let currentQuizIndex = 0;
        let userAnswers = [];

        // --- CORE LOGIC ---

        function handleAuth() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert("성명을 입력하세요.");

            // 동명이인 처리
            const sameNameCount = [...new Set(records.map(r => r.id))].filter(id => id.startsWith(name)).length;
            currentUserId = sameNameCount > 0 && !records.find(r => r.id === name) ? `${name}_${sameNameCount + 1}` : name;
            currentUserName = name;

            // 기존 이수 여부 확인
            const lastPass = records.filter(r => r.id === currentUserId && r.isPassed).pop();
            if (lastPass) {
                showResult(lastPass.score, true, lastPass.attempt);
                return;
            }

            // 과락 횟수 체크
            const attempts = records.filter(r => r.id === currentUserId).length;
            if (attempts >= 3) return alert("3회 과락으로 응시가 제한됩니다. 관리자에게 문의하세요.");

            startQuiz();
        }

        function startQuiz() {
            selectedQuiz = [...quizPool].sort(() => 0.5 - Math.random()).slice(0, 10);
            currentQuizIndex = 0;
            userAnswers = [];
            showStep('step-quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuiz[currentQuizIndex];
            document.getElementById('quiz-progress').innerText = `Question ${currentQuizIndex + 1} / 10`;
            document.getElementById('quiz-question').innerText = q.q;
            document.getElementById('btn-back').style.visibility = currentQuizIndex > 0 ? 'visible' : 'hidden';

            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = "relative";
                btn.innerHTML = `
                    <input type="radio" name="quiz" id="opt${idx}" class="hidden" onclick="selectAnswer(${idx})">
                    <label for="opt${idx}" class="block p-4 border-2 border-slate-100 rounded-xl cursor-pointer hover:border-slate-300 transition font-medium">
                        ${idx + 1}. ${opt}
                    </label>
                `;
                container.appendChild(btn);
            });
        }

        function selectAnswer(idx) {
            userAnswers[currentQuizIndex] = idx;
            // 자동 이동
            setTimeout(() => {
                if (currentQuizIndex < 9) {
                    currentQuizIndex++;
                    renderQuestion();
                } else {
                    finalizeQuiz();
                }
            }, 300);
        }

        function prevQuestion() {
            if (currentQuizIndex > 0) {
                currentQuizIndex--;
                renderQuestion();
            }
        }

        function finalizeQuiz() {
            let correctCount = 0;
            selectedQuiz.forEach((q, i) => { if (q.r === userAnswers[i]) correctCount++; });
            const score = correctCount * 10;
            const isPassed = score >= 80;
            const attempts = records.filter(r => r.id === currentUserId).length + 1;

            const record = {
                id: currentUserId,
                name: currentUserName,
                score: score,
                isPassed: isPassed,
                attempt: attempts,
                date: new Date().toISOString()
            };

            records.push(record);
            localStorage.setItem('sdi_safety_v2_records', JSON.stringify(records));
            showResult(score, isPassed, attempts);
        }

        function showResult(score, isPassed, attempt) {
            showStep('step-result');
            document.getElementById('result-score').innerText = `${score}점`;
            const banner = document.getElementById('result-status-banner');
            const qrBox = document.getElementById('pass-qr-container');
            const failBox = document.getElementById('fail-container');

            if (isPassed) {
                banner.className = "p-4 rounded-xl mb-8 font-bold text-lg bg-emerald-100 text-emerald-700";
                banner.innerText = "교육 이수 완료 (PASS)";
                qrBox.classList.remove('hidden');
                failBox.classList.add('hidden');
                generateQR(currentUserId);
            } else {
                banner.className = "p-4 rounded-xl mb-8 font-bold text-lg bg-rose-100 text-rose-700";
                banner.innerText = "평가 과락 (FAIL)";
                qrBox.classList.add('hidden');
                failBox.classList.remove('hidden');
                document.getElementById('fail-attempts').innerText = `응시 횟수: ${attempt} / 3회`;
            }
        }

        function generateQR(userId) {
            const container = document.getElementById("qrcode");
            container.innerHTML = "";
            const serial = `SDI-ULSAN-${userId}-${Date.now().toString(36).toUpperCase()}`;
            new QRCode(container, { text: serial, width: 160, height: 160, colorDark: "#00377B" });
            document.getElementById('qr-serial').innerText = serial;
        }

        // --- ADMIN DASHBOARD LOGIC ---

        function handleAdminLogin() {
            if (document.getElementById('admin-pw').value === adminPassword) {
                showAdminDashboard();
            } else {
                alert("비밀번호가 일치하지 않습니다.");
            }
        }

        function showAdminDashboard() {
            showStep('step-admin-dash');
            updateStats();
            renderAdminTable();
            renderChart();
        }

        function updateStats() {
            const total = records.length;
            const passed = records.filter(r => r.isPassed).length;
            const avg = total > 0 ? Math.round(records.reduce((a, b) => a + b.score, 0) / total) : 0;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-pass').innerText = passed;
            document.getElementById('stat-avg').innerText = `${avg}점`;
        }

        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            
            // 최신순 정렬
            [...records].reverse().forEach(r => {
                const date = new Date(r.date).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="p-4 text-xs text-slate-500">${date}</td>
                    <td class="p-4 font-bold">${r.name} <span class="text-[10px] text-slate-300 font-normal">#${r.id}</span></td>
                    <td class="p-4 font-mono">${r.score}점</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold ${r.isPassed ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                            ${r.isPassed ? 'PASS' : 'FAIL'}
                        </span>
                    </td>
                    <td class="p-4 text-center font-bold text-slate-400">${r.attempt}회</td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderChart() {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            const months = {};
            records.forEach(r => {
                const m = new Date(r.date).toLocaleString('ko-KR', { month: 'long' });
                if(!months[m]) months[m] = { total: 0, pass: 0 };
                months[m].total++;
                if(r.isPassed) months[m].pass++;
            });

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(months),
                    datasets: [
                        { label: '응시건수', data: Object.values(months).map(v => v.total), backgroundColor: '#cbd5e1' },
                        { label: '이수건수', data: Object.values(months).map(v => v.pass), backgroundColor: '#00377B' }
                    ]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        function exportData() {
            if (records.length === 0) return alert("데이터가 없습니다.");
            const exportData = records.map(r => ({
                "응시일자": new Date(r.date).toLocaleString(),
                "성명": r.name,
                "ID": r.id,
                "점수": r.score,
                "이수여부": r.isPassed ? "PASS" : "FAIL",
                "응시횟수": r.attempt
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "RawData");
            XLSX.writeFile(wb, `SDI_ULSAN_SAFETY_DATA_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        // --- UTILS ---
        function showStep(id) {
            ['step-auth', 'step-quiz', 'step-result', 'step-admin-dash', 'step-admin-login'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function goMain() { showStep('step-auth'); document.getElementById('user-name').value=''; }
        function showAdminLogin() { showStep('step-admin-login'); }
        function changeAdminPw() {
            const p = prompt("새 비밀번호 입력:");
            if(p) { adminPassword = p; alert("변경완료."); }
        }
        function downloadExcelTemplate() {
            const data = [["질문", "보기1", "보기2", "보기3", "보기4", "정답번호(0-3)"]];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Safety_Quiz_Template.xlsx");
        }
    </script>
</body>
</html>
