<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼성SDI 안전교육 평가 시스템 v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --sdi-blue: #0033AD; --sdi-gray: #f4f4f4; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: var(--sdi-gray); }
        .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
        header { background: var(--sdi-blue); color: #fff; padding: 20px; text-align: center; font-weight: bold; }
        .content { padding: 20px; }
        .hidden { display: none; }
        .btn { width: 100%; padding: 15px; background: var(--sdi-blue); color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .btn-excel { background: #217346; } /* 엑셀 색상 */
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .footer { font-size: 0.7rem; text-align: center; padding: 10px; color: #888; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .admin-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #eee; padding: 15px; text-align: center; border-radius: 8px; }
        #qr-code { display: flex; justify-content: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>SAMSUNG SDI 안전교육 평가</header>
    
    <div id="view-home" class="content">
        <div class="card">
            <h3>본인 확인</h3>
            <input type="text" id="input-name" placeholder="성명을 입력하세요" style="width:100%; padding:10px; box-sizing:border-box;">
            <button class="btn" onclick="processAuth()">입장하기</button>
        </div>
        <button onclick="showAdminLogin()" style="background:none; border:none; color:#ccc; width:100%; cursor:pointer;">관리자 전용</button>
    </div>

    <div id="view-result" class="content hidden">
        <h2 id="res-status" style="text-align:center;"></h2>
        <div id="qr-container">
            <div id="qr-code"></div>
            <p style="text-align:center; font-weight:bold;">이수 완료 인증 QR</p>
        </div>
        <div id="fail-msg" class="hidden" style="color:red; text-align:center; font-weight:bold;">
            80점 미만 과락입니다. 재교육을 진행하세요.
        </div>
        <button class="btn" onclick="location.reload()">메인으로 이동</button>
    </div>

    <div id="view-admin" class="content hidden">
        <h3>관리자 대시보드</h3>
        <div class="admin-stat-grid">
            <div class="stat-box"><small>당월 응시자</small><br><strong id="stat-total">0</strong>명</div>
            <div class="stat-box"><small>당월 수료자</small><br><strong id="stat-pass">0</strong>명</div>
        </div>
        
        <div class="card">
            <h4>문제은행 업데이트</h4>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" style="font-size:0.8rem;">
            <p style="font-size:0.7rem; color:#666;">*제공된 엑셀 양식으로 업로드해 주세요.</p>
        </div>

        <button class="btn btn-excel" onclick="exportRawData()">전체 RAW DATA 추출 (Excel)</button>
        <button class="btn" style="background:#666;" onclick="location.reload()">로그아웃</button>
    </div>

    <div class="footer">삼성SDI 울산</div>
</div>

<script>
    // --- 기능 로직 ---
    function processAuth() {
        const name = document.getElementById('input-name').value.trim();
        if(!name) return alert("성명을 입력하세요.");
        
        let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
        let passed = history.find(h => h.name.startsWith(name) && h.result === "Pass");
        
        if(passed) {
            alert("이미 이수 완료된 인원입니다. QR을 표시합니다.");
            showQR(passed.name, passed.date);
        } else {
            // 시험 시작 로직 (v1과 동일하므로 생략, 이수 시 showQR 호출)
            // 데모용으로 바로 합격 처리 시나리오
            const score = 90; // 실제로는 시험 결과 값
            saveAndShowResult(name, score);
        }
    }

    function saveAndShowResult(name, score) {
        const isPass = score >= 80;
        const date = new Date();
        const record = {
            date: date.toLocaleDateString(),
            month: (date.getMonth() + 1).toString(), // 월별 통계용
            name: name,
            score: score,
            result: isPass ? "Pass" : "Fail"
        };
        
        let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
        history.push(record);
        localStorage.setItem('sdi_history', JSON.stringify(history));

        if(isPass) showQR(name, record.date);
        else showFail();
    }

    function showQR(name, date) {
        document.getElementById('view-home').classList.add('hidden');
        document.getElementById('view-result').classList.remove('hidden');
        document.getElementById('res-status').innerText = "합격을 축하합니다";
        document.getElementById('res-status').style.color = "blue";
        
        // QR 생성
        document.getElementById('qr-code').innerHTML = "";
        new QRCode(document.getElementById("qr-code"), {
            text: `SDI-VERIFIED:${name}:${date}`,
            width: 160, height: 160
        });
    }

    function showFail() {
        document.getElementById('view-home').classList.add('hidden');
        document.getElementById('view-result').classList.remove('hidden');
        document.getElementById('qr-container').classList.add('hidden');
        document.getElementById('fail-msg').classList.remove('hidden');
        document.getElementById('res-status').innerText = "불합격 (재교육 대상)";
    }

    // --- 관리자 기능 ---
    function showAdminLogin() {
        const pw = prompt("관리자 비밀번호를 입력하세요.");
        if(pw === "1234") { // 초기 비번
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            updateStats();
        }
    }

    function updateStats() {
        let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
        const currentMonth = (new Date().getMonth() + 1).toString();
        
        const thisMonthRecords = history.filter(h => h.month === currentMonth);
        const passRecords = thisMonthRecords.filter(h => h.result === "Pass");
        
        document.getElementById('stat-total').innerText = thisMonthRecords.length;
        document.getElementById('stat-pass').innerText = passRecords.length;
    }

    function exportRawData() {
        let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
        if(history.length === 0) return alert("추출할 데이터가 없습니다.");
        
        const ws = XLSX.utils.json_to_sheet(history);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "전체응시현황");
        XLSX.writeFile(wb, `삼성SDI_안전현황_RAW_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // 엑셀 업로드 리스너
    document.getElementById('excel-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);
            
            // 로컬 저장소에 문제은행 저장
            localStorage.setItem('sdi_quiz_bank', JSON.stringify(jsonData));
            alert(`${jsonData.length}개의 문제가 성공적으로 업데이트되었습니다.`);
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
