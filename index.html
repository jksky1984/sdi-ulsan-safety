<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Safety | 삼성SDI 안전교육 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR 코드 생성을 위한 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --samsung-blue: #0047BA; --samsung-dark: #002D72; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .samsung-blue { background-color: var(--samsung-blue); }
        .samsung-blue-text { color: var(--samsung-blue); }
        .btn-primary { background-color: var(--samsung-blue); color: white; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); background-color: var(--samsung-dark); }
        .quiz-option { border: 2px solid #e5e7eb; transition: all 0.2s; cursor: pointer; border-radius: 12px; }
        .quiz-option.selected { border-color: var(--samsung-blue); background-color: #eff6ff; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .tab-btn.active { border-bottom: 3px solid var(--samsung-blue); color: var(--samsung-blue); font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        #qrcode img { margin: 0 auto; display: block; border: 4px solid white; border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-xl overflow-hidden relative">
        
        <!-- Header -->
        <header class="samsung-blue text-white p-5 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-1 rounded-sm"><i class="fas fa-check-double samsung-blue-text text-sm"></i></div>
                <h1 class="font-bold text-lg tracking-tighter">S-SAFETY <span class="font-light opacity-70 ml-1">ULS-PLANT</span></h1>
            </div>
            <button id="adminBtn" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center">
                <i class="fas fa-cog opacity-50 text-xl"></i>
            </button>
        </header>

        <!-- Main Content Area -->
        <main id="content" class="flex-grow p-6 overflow-y-auto">
            <div id="loading" class="flex flex-col items-center justify-center h-full space-y-4">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
                <p class="text-gray-400 text-sm font-medium">시스템 최적화 중...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="p-4 bg-gray-50 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Samsung SDI Ulsan Plant</p>
        </footer>

        <!-- Admin Pass Modal -->
        <div id="adminPassModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-6">
            <div class="bg-white rounded-3xl w-full p-8 space-y-6 animate-in">
                <div class="text-center">
                    <h3 class="text-xl font-bold">관리자 인증</h3>
                    <p class="text-sm text-gray-500 mt-1">비밀번호를 입력해 주세요.</p>
                </div>
                <input type="password" id="adminPass" class="w-full p-4 bg-gray-100 rounded-2xl text-center text-2xl tracking-widest outline-none border-2 border-transparent focus:border-blue-600" placeholder="••••">
                <div class="flex space-x-2">
                    <button id="adminClose" class="flex-1 py-4 text-gray-400 font-bold">취소</button>
                    <button id="adminConfirm" class="flex-1 py-4 samsung-blue text-white rounded-2xl font-bold">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // [필독] 실제 배포 시 본인의 Firebase Config로 교체하세요.
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const STATE = {
            view: 'login',
            user: null,
            db: null,
            isDemo: false,
            questions: [
                { q: "삼성SDI 울산 사업장 내 보행 중 스마트폰 사용은?", a: ["허용됨", "지정 장소만 가능", "절대 금지", "문자만 가능"], c: 2 },
                { q: "지게차 주변 보행 시 안전 거리 확보 기준은?", a: ["1M 이내", "운전석 뒤", "최소 2M 이상 및 시선 맞춤", "장비 바로 옆"], c: 2 },
                { q: "화재 발생 시 가장 먼저 전파하는 방법은?", a: ["조용히 대피", "불이야 외치고 발신기 작동", "팀장님께 전화", "카톡 공지"], c: 1 },
                { q: "전기 기구 사용 전 피복 노출을 확인해야 합니까?", a: ["예", "아니오", "망가졌을 때만", "귀찮으면 생략"], c: 0 },
                { q: "고소 작업 시 추락 방지를 위한 필수 장비는?", a: ["슬리퍼", "안전모만", "안전대(생명줄)", "장갑"], c: 2 },
                { q: "화학물질 취급 시 반드시 확인해야 하는 자료는?", a: ["신문", "작업일지", "MSDS", "명함"], c: 2 },
                { q: "정리정돈의 '5S'에 해당하지 않는 것은?", a: ["정리", "정돈", "청소", "낭비"], c: 3 },
                { q: "작업장 내 금연 구역에서의 흡연 시 조치는?", a: ["주의", "과태료 및 징계", "묵인", "칭찬"], c: 1 },
                { q: "밀폐공간 진입 전 산소 농도를 측정해야 합니까?", a: ["예", "아니오", "나중에", "가끔"], c: 0 },
                { q: "사고 발생 시 즉시 보고해야 하는 대상은?", a: ["가족", "친구", "현장 관리자 및 안전팀", "퇴사자"], c: 2 }
            ],
            currentQuiz: [],
            currentIndex: 0,
            answers: []
        };

        const content = document.getElementById('content');

        async function init() {
            if (firebaseConfig.apiKey.startsWith("AIzaSy")) {
                console.warn("Firebase 정보가 데모값이므로 데모 모드로 동작합니다.");
                STATE.isDemo = true;
            } else {
                try {
                    const app = initializeApp(firebaseConfig);
                    STATE.db = getFirestore(app);
                    const auth = getAuth(app);
                    await signInAnonymously(auth);
                    
                    const qSnap = await getDoc(doc(STATE.db, 'config', 'questionBank'));
                    if(qSnap.exists()) STATE.questions = qSnap.data().list;
                } catch (e) {
                    console.error("DB 연결 실패:", e);
                    STATE.isDemo = true;
                }
            }
            render();
        }

        function render() {
            content.innerHTML = '';
            if (STATE.view === 'login') renderLogin();
            else if (STATE.view === 'dashboard') renderDashboard();
            else if (STATE.view === 'quiz') renderQuiz();
            else if (STATE.view === 'result') renderResult();
            else if (STATE.view === 'admin') renderAdmin();
        }

        function renderLogin() {
            content.innerHTML = `
                <div class="flex flex-col justify-center h-full space-y-8 animate-in">
                    <div class="text-center space-y-2">
                        <div class="inline-block p-4 rounded-3xl bg-blue-50 mb-4 text-4xl samsung-blue-text"><i class="fas fa-id-card"></i></div>
                        <h2 class="text-2xl font-bold text-gray-800">본인 인증</h2>
                        <p class="text-gray-400 text-sm">교육 이수를 위해 성명을 입력하세요.</p>
                    </div>
                    <input type="text" id="nameInput" placeholder="성명(실명) 입력" class="w-full p-5 rounded-2xl border-2 border-gray-100 focus:border-blue-600 outline-none text-xl font-medium">
                    <button id="loginBtn" class="w-full py-5 rounded-2xl text-white font-bold btn-primary text-lg shadow-lg">확인 및 시작</button>
                </div>`;
            document.getElementById('loginBtn').onclick = handleLogin;
        }

        async function handleLogin() {
            const name = document.getElementById('nameInput').value.trim();
            if(!name) return alert('성명을 입력해주세요.');

            if(STATE.isDemo) {
                STATE.user = { name, attempts: 0, status: 'none', score: 0 };
                STATE.view = 'dashboard';
                render();
            } else {
                const userRef = doc(STATE.db, 'users', name);
                const snap = await getDoc(userRef);
                if(snap.exists()) {
                    STATE.user = snap.data();
                    // 이미 합격한 사람은 바로 결과(QR) 페이지로
                    STATE.view = (STATE.user.status === 'passed') ? 'result' : 'dashboard';
                } else {
                    STATE.user = { name, attempts: 0, status: 'none', score: 0 };
                    STATE.view = 'dashboard';
                }
                render();
            }
        }

        function renderDashboard() {
            const blocked = STATE.user.attempts >= 3 && STATE.user.status !== 'passed';
            content.innerHTML = `
                <div class="space-y-6 animate-in">
                    <div class="glass-card p-6 border border-gray-100">
                        <h3 class="font-bold text-lg mb-4 text-gray-700">나의 교육 정보</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between py-1 border-b border-gray-50"><span class="text-gray-400">성명</span><span class="font-bold">${STATE.user.name}</span></div>
                            <div class="flex justify-between py-1 border-b border-gray-50"><span class="text-gray-400">응시 횟수</span><span class="font-bold text-blue-600">${STATE.user.attempts} / 3회</span></div>
                            <div class="flex justify-between py-1"><span class="text-gray-400">이수 상태</span><span class="font-bold">${STATE.user.status === 'passed' ? '합격' : '미이수'}</span></div>
                        </div>
                    </div>
                    ${blocked ? `
                        <div class="p-6 bg-red-50 rounded-3xl text-center border border-red-100">
                            <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-2"></i>
                            <p class="text-red-700 font-bold">3회 과락으로 응시 불가</p>
                            <p class="text-xs text-red-600 mt-1">안전관리팀에 문의하시기 바랍니다.</p>
                        </div>
                    ` : `
                        <button id="startQuiz" class="w-full py-5 rounded-2xl btn-primary font-bold shadow-xl text-lg">안전 평가 시작</button>
                    `}
                </div>`;
            if(!blocked) document.getElementById('startQuiz').onclick = startQuiz;
        }

        function startQuiz() {
            STATE.currentQuiz = [...STATE.questions].sort(() => 0.5 - Math.random()).slice(0, 10);
            STATE.currentIndex = 0;
            STATE.answers = [];
            STATE.view = 'quiz';
            render();
        }

        function renderQuiz() {
            const q = STATE.currentQuiz[STATE.currentIndex];
            content.innerHTML = `
                <div class="space-y-6 animate-in h-full flex flex-col">
                    <div class="flex justify-between text-xs font-bold text-gray-400 uppercase tracking-widest">
                        <span>Problem ${STATE.currentIndex + 1} / 10</span>
                        <span>${((STATE.currentIndex + 1) / 10 * 100)}%</span>
                    </div>
                    <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full samsung-blue transition-all duration-500" style="width: ${((STATE.currentIndex + 1) / 10 * 100)}%"></div>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 leading-tight min-h-[60px]">${q.q}</h3>
                    <div class="space-y-3 flex-grow">
                        ${q.a.map((opt, i) => `
                            <div onclick="selectAnswer(${i})" class="quiz-option p-4 flex items-center space-x-3 ${STATE.answers[STATE.currentIndex] === i ? 'selected' : ''}">
                                <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-bold text-gray-400 text-sm">${i+1}</span>
                                <span class="font-medium text-gray-600">${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex space-x-2 pt-4">
                        <button onclick="prevStep()" class="flex-1 py-4 bg-gray-100 rounded-2xl font-bold text-gray-500 ${STATE.currentIndex === 0 ? 'opacity-30' : ''}">이전 문제</button>
                    </div>
                </div>`;
        }

        window.selectAnswer = (idx) => {
            STATE.answers[STATE.currentIndex] = idx;
            render(); // UI 즉시 반영 (선택 효과)
            
            setTimeout(() => {
                if(STATE.currentIndex < 9) {
                    STATE.currentIndex++;
                    render();
                } else {
                    finishQuiz();
                }
            }, 350); // 자동 다음 단계 이동
        };

        window.prevStep = () => {
            if(STATE.currentIndex > 0) {
                STATE.currentIndex--;
                render();
            }
        };

        async function finishQuiz() {
            let score = 0;
            STATE.currentQuiz.forEach((q, i) => { if(q.c === STATE.answers[i]) score += 10; });
            const isPassed = score >= 80;
            const newAttempts = (STATE.user.attempts || 0) + 1;
            
            const resultData = {
                name: STATE.user.name,
                score: score,
                status: isPassed ? 'passed' : (newAttempts >= 3 ? 'blocked' : 'failed'),
                attempts: newAttempts,
                lastDate: new Date().toLocaleString()
            };

            if(!STATE.isDemo) {
                try {
                    await setDoc(doc(STATE.db, 'users', STATE.user.name), resultData);
                } catch (e) {
                    alert('데이터 저장 실패: ' + e.message);
                }
            }

            STATE.user = resultData;
            STATE.view = 'result';
            render();
        }

        function renderResult() {
            const passed = STATE.user.status === 'passed';
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full space-y-6 animate-in">
                    <div class="glass-card p-8 w-full text-center border-t-8 ${passed ? 'border-green-500' : 'border-red-500'}">
                        <i class="fas ${passed ? 'fa-certificate text-green-500' : 'fa-times-circle text-red-500'} text-6xl mb-4"></i>
                        <h2 class="text-4xl font-black text-gray-800">${STATE.user.score}점</h2>
                        <p class="font-bold ${passed ? 'text-green-600' : 'text-red-500'} text-xl mb-6">${passed ? '최종 합격 (이수)' : '과락 (재시험)'}</p>
                        
                        ${passed ? `
                            <div class="bg-blue-50 p-6 rounded-2xl space-y-4 shadow-inner">
                                <p class="text-xs font-bold text-blue-800 border-b border-blue-100 pb-2 uppercase tracking-widest">Authorized Safety Pass</p>
                                <div id="qrcode" class="flex justify-center p-2 bg-white rounded-lg shadow-sm w-[160px] h-[160px] mx-auto overflow-hidden"></div>
                                <div class="text-[10px] text-gray-400 mt-2 space-y-1">
                                    <p class="font-bold text-gray-600">${STATE.user.name}</p>
                                    <p>${STATE.user.lastDate}</p>
                                </div>
                            </div>
                        ` : `
                            <div class="bg-red-50 p-4 rounded-xl">
                                <p class="text-sm text-red-600">80점 이상 획득 시 합격입니다.<br>남은 기회: ${3 - STATE.user.attempts}회</p>
                            </div>
                            <button onclick="location.reload()" class="mt-6 w-full py-4 bg-gray-100 rounded-2xl font-bold">다시 시도</button>
                        `}
                    </div>
                    ${passed ? `<button onclick="location.reload()" class="text-blue-600 font-bold underline">메인으로 돌아가기</button>` : ''}
                </div>`;
            
            // QR 코드 생성 (합격 시에만)
            if(passed) {
                setTimeout(() => {
                    const qrcodeContainer = document.getElementById("qrcode");
                    if (qrcodeContainer) {
                        new QRCode(qrcodeContainer, {
                            text: `SDI-ULSAN-SAFE|${STATE.user.name}|${STATE.user.lastDate}|PASS`,
                            width: 144,
                            height: 144,
                            colorDark: "#0047BA",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                    }
                }, 300); // 렌더링 후 약간의 지연 시간 부여로 안정성 확보
            }
        }

        function renderAdmin() {
            content.innerHTML = `
                <div class="space-y-6 animate-in">
                    <div class="flex border-b">
                        <button onclick="setAdminTab('data')" id="tab-data" class="tab-btn flex-1 py-3 active">누적 데이터</button>
                        <button onclick="setAdminTab('questions')" id="tab-questions" class="tab-btn flex-1 py-3">문제은행</button>
                    </div>
                    <div id="admin-sub-content"></div>
                </div>`;
            setAdminTab('data');
        }

        window.setAdminTab = async (tab) => {
            const sub = document.getElementById('admin-sub-content');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            if(tab === 'data') {
                sub.innerHTML = '<p class="text-center p-10 text-gray-400">서버 데이터를 읽어오는 중...</p>';
                let list = [];
                if(!STATE.isDemo) {
                    const snap = await getDocs(collection(STATE.db, 'users'));
                    snap.forEach(d => list.push(d.data()));
                } else {
                    list = [{name: '홍길동(데모)', score: 90, status: 'passed', attempts: 1, lastDate: '2023-10-01'}];
                }

                sub.innerHTML = `
                    <div class="space-y-4">
                        <div class="max-h-[300px] overflow-y-auto space-y-2 border rounded-2xl p-2 bg-gray-50">
                            ${list.map(i => `
                                <div class="p-3 bg-white rounded-xl flex justify-between items-center text-xs shadow-sm">
                                    <div><p class="font-bold text-gray-700">${i.name}</p><p class="text-[9px] text-gray-400">${i.lastDate}</p></div>
                                    <div class="text-right">
                                        <p class="${i.status === 'passed' ? 'text-green-600' : 'text-red-500'} font-bold">${i.score}점</p>
                                        <p class="text-[9px] bg-gray-100 rounded px-1">${i.attempts}회 응시</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button id="downloadCsv" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold text-sm shadow-md">
                            <i class="fas fa-file-excel mr-2"></i>엑셀(CSV) 다운로드
                        </button>
                    </div>`;
                
                document.getElementById('downloadCsv').onclick = () => {
                    let csv = "\ufeff성명,점수,상태,시도횟수,이수일시\n";
                    list.forEach(i => csv += `${i.name},${i.score},${i.status},${i.attempts},${i.lastDate}\n`);
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `Safety_Results_${new Date().toISOString().slice(0,10)}.csv`;
                    a.click();
                };

            } else {
                sub.innerHTML = `
                    <div class="space-y-4">
                        <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                            <p class="text-[11px] text-blue-700 font-medium leading-tight">
                                <b>업로드 안내:</b> 엑셀/워드 자료의 문제를 아래 JSON 형식에 맞춰 붙여넣으세요.<br>
                                형식: [{"q": "질문", "a": ["보기1", "보기2", "보기3", "보기4"], "c": 0(정답인덱스)}]
                            </p>
                        </div>
                        <textarea id="qEditor" class="w-full h-64 p-4 bg-gray-50 rounded-2xl text-[10px] font-mono outline-none border border-gray-200" spellcheck="false">${JSON.stringify(STATE.questions, null, 2)}</textarea>
                        <button id="saveQuestions" class="w-full py-4 samsung-blue text-white rounded-2xl font-bold shadow-lg">문제은행 즉시 적용</button>
                    </div>`;

                document.getElementById('saveQuestions').onclick = async () => {
                    try {
                        const newList = JSON.parse(document.getElementById('qEditor').value);
                        if(!Array.isArray(newList)) throw new Error('배열 형식이 아닙니다.');
                        STATE.questions = newList;
                        if(!STATE.isDemo) {
                            await setDoc(doc(STATE.db, 'config', 'questionBank'), { list: newList });
                        }
                        alert('문제은행이 서버에 저장되었습니다.');
                    } catch (err) {
                        alert('JSON 형식이 올바르지 않습니다: ' + err.message);
                    }
                };
            }
        };

        // Modal Controls
        const adminModal = document.getElementById('adminPassModal');
        document.getElementById('adminBtn').onclick = () => adminModal.classList.remove('hidden');
        document.getElementById('adminClose').onclick = () => adminModal.classList.add('hidden');
        document.getElementById('adminConfirm').onclick = () => {
            if(document.getElementById('adminPass').value === '1234') {
                adminModal.classList.add('hidden');
                STATE.view = 'admin';
                render();
            } else {
                alert('비밀번호가 일치하지 않습니다.');
                document.getElementById('adminPass').value = '';
            }
        };

        window.onload = init;
    </script>
</body>
</html>
