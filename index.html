<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼성SDI 안전교육 평가 시스템</title>
    <!-- 외부 라이브러리: QR 생성 및 엑셀 추출 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --sdi-blue: #0033AD; --sdi-gray: #f4f4f4; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: var(--sdi-gray); color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        header { background: var(--sdi-blue); color: #fff; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .content { padding: 20px; flex: 1; }
        .input-group { margin-bottom: 15px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--sdi-blue); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .hidden { display: none; }
        .footer { font-size: 0.7rem; text-align: center; padding: 10px; color: #888; border-top: 1px solid #eee; }
        .quiz-option { display: block; padding: 15px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .quiz-option:active { background: #e0eaff; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-back { background: #666; }
        #qr-code { display: flex; justify-content: center; margin-top: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>SAMSUNG SDI 안전교육</header>
    
    <!-- 1단계: 본인인증 -->
    <div id="step-auth" class="content">
        <h3>본인 인증</h3>
        <p>성명을 입력해 주세요.</p>
        <div class="input-group">
            <input type="text" id="user-name" placeholder="성명 입력">
        </div>
        <button onclick="checkAuth()">다음 단계</button>
        <button onclick="showAdminLogin()" style="background:none; color:#999; font-size:0.8rem;">관리자 모드</button>
    </div>

    <!-- 2단계: 문제 풀이 -->
    <div id="step-quiz" class="content hidden">
        <h4 id="quiz-progress">문제 1 / 10</h4>
        <div id="quiz-container">
            <p id="quiz-question" style="font-weight:bold; margin-bottom:20px;"></p>
            <div id="quiz-options"></div>
        </div>
        <div class="nav-btns">
            <button class="btn-back" onclick="prevQuestion()">이전</button>
            <button id="btn-submit" class="hidden" onclick="finishQuiz()">제출하기</button>
        </div>
    </div>

    <!-- 3단계: 결과 확인 -->
    <div id="step-result" class="content hidden text-center">
        <h3>평가 결과</h3>
        <div id="result-text" style="font-size:1.2rem; font-weight:bold; margin:20px 0;"></div>
        <div id="qr-area">
            <p id="qr-msg"></p>
            <div id="qr-code"></div>
        </div>
        <button onclick="location.reload()">메인으로</button>
    </div>

    <!-- 관리자 모드 -->
    <div id="step-admin" class="content hidden">
        <h3>관리자 모드</h3>
        <div id="admin-login">
            <input type="password" id="admin-pw" placeholder="비밀번호 입력">
            <button onclick="loginAdmin()">로그인</button>
        </div>
        <div id="admin-panel" class="hidden">
            <button onclick="exportExcel()">데이터 내보내기 (Excel)</button>
            <button onclick="resetAdminPw()" style="background:#666;">비밀번호 변경</button>
            <h4 style="margin-top:20px;">응시자 현황</h4>
            <div style="overflow-x:auto;">
                <table class="admin-table" id="data-table">
                    <thead><tr><th>날짜</th><th>이름</th><th>점수</th><th>결과</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <button onclick="closeAdmin()" style="margin-top:20px;">나가기</button>
        </div>
    </div>

    <div class="footer">삼성SDI 울산</div>
</div>

<script>
// --- 데이터 및 초기화 ---
let currentUser = "";
let currentStep = 0;
let userAnswers = new Array(10).fill(null);
let selectedQuestions = [];
let failCount = 0;

// 삼성SDI 안전문제 데이터베이스 (20문항 중 랜덤 10문항 추출용)
const questionBank = [
    {q: "보행 중 스마트폰 사용 시 벌금 및 금지 사항인가요?", a: ["예", "아니오", "선택사항", "모름"], correct: 0},
    {q: "안전모 착용 시 올바른 방법은?", a: ["그냥 쓴다", "턱끈을 조인다", "뒤로 쓴다", "걸쳐 둔다"], correct: 1},
    {q: "LOTO(Lock-Out, Tag-Out) 절차의 목적은?", a: ["청소", "에너지 차단", "비용절감", "인원파악"], correct: 1},
    {q: "사내 제한 속도는 얼마인가요?", a: ["10km/h", "20km/h", "30km/h", "50km/h"], correct: 1},
    {q: "화재 발생 시 가장 먼저 해야 할 일은?", a: ["짐 챙기기", "발신기를 누르고 전파", "엘리베이터 탑승", "사진 촬영"], correct: 1},
    {q: "밀폐공간 작업 전 측정해야 할 항목은?", a: ["습도", "산소 농도", "조도", "소음"], correct: 1},
    {q: "소화기 사용법 중 'P'는 무엇의 약자인가요?", a: ["Pull(핀 뽑기)", "Push", "Pass", "Point"], correct: 0},
    {q: "사내 보행 시 반드시 지켜야 할 곳은?", a: ["차도", "횡단보도 및 보행로", "잔디밭", "하역장"], correct: 1},
    {q: "전기 작업 시 착용해야 할 보호구는?", a: ["절연장갑", "면장갑", "가죽장갑", "코팅장갑"], correct: 0},
    {q: "물질안전보건자료의 약칭은?", a: ["KOSHA", "MSDS", "OSHA", "ISO"], correct: 1},
    // ... 추가 문항 (20개까지 확장 가능)
];

// --- 주요 기능 로직 ---

function checkAuth() {
    const nameInput = document.getElementById('user-name').value.trim();
    if(!nameInput) return alert("성명을 입력하세요.");

    // 데이터 확인 (기존 이수자 또는 과락 횟수 체크)
    let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
    let userRecords = history.filter(h => h.name.startsWith(nameInput));
    
    // 동명이인 처리 (넘버링)
    currentUser = nameInput + (userRecords.length > 0 ? `_${userRecords.length + 1}` : "");
    
    // 이미 이수한 사람인지 확인
    let passedRecord = userRecords.find(r => r.result === "Pass");
    if(passedRecord) {
        showResult(passedRecord.score, true, true);
        return;
    }

    // 3회 과락 여부 확인
    let failRecords = userRecords.filter(r => r.result === "Fail");
    if(failRecords.length >= 3) {
        alert("3회 이상 과락으로 재교육이 불가합니다. 관리자에게 문의하세요.");
        return;
    }

    startQuiz();
}

function startQuiz() {
    selectedQuestions = questionBank.sort(() => 0.5 - Math.random()).slice(0, 10);
    currentStep = 0;
    document.getElementById('step-auth').classList.add('hidden');
    document.getElementById('step-quiz').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    const q = selectedQuestions[currentStep];
    document.getElementById('quiz-progress').innerText = `문제 ${currentStep + 1} / 10`;
    document.getElementById('quiz-question').innerText = q.q;
    
    let html = "";
    q.a.forEach((opt, idx) => {
        html += `<div class="quiz-option" onclick="selectAnswer(${idx})">${idx+1}. ${opt}</div>`;
    });
    document.getElementById('quiz-options').innerHTML = html;
    
    document.getElementById('btn-submit').classList.toggle('hidden', currentStep !== 9);
}

function selectAnswer(idx) {
    userAnswers[currentStep] = idx;
    if(currentStep < 9) {
        currentStep++;
        renderQuestion();
    }
}

function prevQuestion() {
    if(currentStep > 0) {
        currentStep--;
        renderQuestion();
    }
}

function finishQuiz() {
    if(userAnswers.includes(null)) return alert("모든 문제에 답해주세요.");
    
    let score = 0;
    selectedQuestions.forEach((q, i) => {
        if(q.correct === userAnswers[i]) score += 10;
    });

    const isPass = score >= 80;
    saveData(score, isPass);
    showResult(score, isPass);
}

function saveData(score, isPass) {
    let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
    history.push({
        date: new Date().toLocaleDateString(),
        name: currentUser,
        score: score,
        result: isPass ? "Pass" : "Fail"
    });
    localStorage.setItem('sdi_history', JSON.stringify(history));
}

function showResult(score, isPass, isExisting = false) {
    document.getElementById('step-quiz').classList.add('hidden');
    document.getElementById('step-auth').classList.add('hidden');
    document.getElementById('step-result').classList.remove('hidden');
    
    const resText = document.getElementById('result-text');
    resText.innerText = `${currentUser}님 : ${score}점 (${isPass ? '합격' : '불합격'})`;
    resText.style.color = isPass ? "blue" : "red";

    if(isPass) {
        document.getElementById('qr-msg').innerText = "이수 완료 QR 코드";
        new QRCode(document.getElementById("qr-code"), {
            text: `SDI-PASS:${currentUser}:${new Date().toLocaleDateString()}`,
            width: 128, height: 128
        });
    } else {
        document.getElementById('qr-msg').innerText = "80점 미만 과락입니다. 재교육이 필요합니다.";
    }
}

// --- 관리자 기능 ---
function showAdminLogin() {
    document.getElementById('step-auth').classList.add('hidden');
    document.getElementById('step-admin').classList.remove('hidden');
}

function loginAdmin() {
    const pw = document.getElementById('admin-pw').value;
    const storedPw = localStorage.getItem('sdi_admin_pw') || "1234"; // 초기 비번 1234
    if(pw === storedPw) {
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        loadAdminData();
    } else {
        alert("비밀번호가 틀렸습니다.");
    }
}

function loadAdminData() {
    let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
    const tbody = document.querySelector('#data-table tbody');
    tbody.innerHTML = history.map(h => `<tr><td>${h.date}</td><td>${h.name}</td><td>${h.score}</td><td>${h.result}</td></tr>`).join('');
}

function exportExcel() {
    let history = JSON.parse(localStorage.getItem('sdi_history') || "[]");
    const ws = XLSX.utils.json_to_sheet(history);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "응시현황");
    XLSX.writeFile(wb, `SDI_안전교육_현황_${new Date().toLocaleDateString()}.xlsx`);
}

function resetAdminPw() {
    const newPw = prompt("새로운 비밀번호를 입력하세요.");
    if(newPw) {
        localStorage.setItem('sdi_admin_pw', newPw);
        alert("변경되었습니다.");
    }
}

function closeAdmin() { location.reload(); }
</script>
</body>
</html>
