!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Safety | 삼성SDI 울산 안전교육</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --samsung-blue: #0047BA; --samsung-dark: #002D72; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; }
        .samsung-blue { background-color: var(--samsung-blue); }
        .samsung-blue-text { color: var(--samsung-blue); }
        .btn-primary { background-color: var(--samsung-blue); transition: all 0.2s; }
        .btn-primary:hover { background-color: var(--samsung-dark); }
        .quiz-option { border: 2px solid #e5e7eb; transition: all 0.2s; cursor: pointer; }
        .quiz-option.selected { border-color: var(--samsung-blue); background-color: #f0f7ff; }
        .glass-card { background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border-radius: 20px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out; }
        #qrcode img { margin: 0 auto; border: 4px solid white; padding: 10px; border-radius: 12px; background: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="max-w-md mx-auto w-full min-h-screen bg-white shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="samsung-blue text-white p-5 sticky top-0 z-50 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-1 rounded">
                    <svg width="24" height="24" viewBox="0 0 100 100" class="samsung-blue-text">
                        <path d="M10 50 L40 80 L90 20" stroke="currentColor" stroke-width="15" fill="none" />
                    </svg>
                </div>
                <h1 class="font-bold text-lg tracking-tight">S-SAFETY <span class="font-light ml-1 opacity-80">SDI</span></h1>
            </div>
            <button id="adminBtn" class="opacity-50 hover:opacity-100"><i class="fas fa-user-shield"></i></button>
        </header>

        <!-- Main Content -->
        <main id="content" class="flex-grow flex flex-col p-6 overflow-y-auto">
            <div id="loader" class="flex flex-col items-center justify-center h-64 space-y-4">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-700"></div>
                <p class="text-gray-500 text-sm">시스템을 불러오는 중입니다...</p>
                <p id="debugMsg" class="text-[10px] text-gray-300"></p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="p-4 border-t border-gray-100 text-center bg-gray-50">
            <p class="text-[10px] text-gray-400 tracking-wider">SAMSUNG SDI ULSAN PLANT</p>
            <p class="text-[9px] text-gray-300 mt-1 uppercase">Safety & Health Education System</p>
        </footer>
    </div>

    <!-- UI Notification Modal -->
    <div id="alertModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 hidden">
        <div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl text-center">
            <i id="alertIcon" class="fas fa-exclamation-circle text-4xl mb-4 text-orange-500"></i>
            <h3 id="alertTitle" class="text-lg font-bold mb-2">알림</h3>
            <p id="alertMsg" class="text-sm text-gray-600 mb-6"></p>
            <button id="alertClose" class="w-full py-3 samsung-blue text-white rounded-xl font-bold">확인</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global 환경 변수 체크
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sdi-safety-ulsan';
        let firebaseConfig = {};
        
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.error("Firebase Config Error:", e);
        }

        // App State
        let state = {
            view: 'login',
            user: null,
            questions: [],
            currentQuiz: [],
            currentIndex: 0,
            answers: [],
            attempts: 0,
            isInitialized: false
        };

        const content = document.getElementById('content');

        // 초기화 함수
        async function initApp() {
            const debug = document.getElementById('debugMsg');
            
            // Firebase 설정이 없는 경우 (로컬 테스트나 GitHub 첫 배포 시)
            if (!firebaseConfig.apiKey) {
                console.warn("Firebase configuration is missing. Running in demo mode.");
                if(debug) debug.innerText = "Demo Mode (No Firebase)";
                state.isInitialized = true;
                render();
                return;
            }

            try {
                const firebaseApp = initializeApp(firebaseConfig);
                const auth = getAuth(firebaseApp);
                const db = getFirestore(firebaseApp);

                // Auth 초기화
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                state.db = db;
                state.auth = auth;
                state.isInitialized = true;
                render();
            } catch (error) {
                console.error("Initialization Error:", error);
                if(debug) debug.innerText = "Connection Error. Please check Firebase settings.";
                // 에러 발생 시에도 최소한의 로그인 화면은 보여줌
                state.isInitialized = true;
                render();
            }
        }

        async function render() {
            if (!state.isInitialized) return;
            
            content.innerHTML = '';
            switch(state.view) {
                case 'login': renderLogin(); break;
                case 'dashboard': renderDashboard(); break;
                case 'quiz': renderQuiz(); break;
                case 'result': renderResult(); break;
                case 'admin': renderAdmin(); break;
            }
        }

        function renderLogin() {
            content.innerHTML = `
                <div class="animate-slide space-y-8 flex flex-col justify-center h-full">
                    <div class="text-center space-y-3">
                        <div class="inline-block p-4 rounded-full bg-blue-50 mb-4">
                            <i class="fas fa-hard-hat text-4xl samsung-blue-text"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800">안전교육 시스템</h2>
                        <p class="text-gray-500 text-sm">성명을 입력하여 인증을 진행해 주세요.</p>
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="nameInput" placeholder="성명 입력" 
                            class="w-full px-5 py-4 rounded-xl border-2 border-gray-100 focus:border-blue-600 outline-none transition-all text-lg font-medium">
                        <button id="loginBtn" class="w-full py-4 rounded-xl text-white font-bold btn-primary shadow-lg text-lg">
                            인증 및 시작하기
                        </button>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-[11px] text-gray-500 leading-relaxed border border-gray-100">
                        <p>• 안전 교육 및 평가는 필수 사항입니다.</p>
                        <p>• 평가 결과는 관리자에게 자동 전송됩니다.</p>
                        <p>• PASS 인력은 기존 QR 코드가 바로 조회됩니다.</p>
                    </div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = handleLogin;
        }

        async function handleLogin() {
            const name = document.getElementById('nameInput').value.trim();
            if(!name) { showAlert('알림', '성명을 입력해주세요.'); return; }

            // Firebase가 설정되지 않은 경우 데모 데이터로 진행
            if (!state.db) {
                state.user = { name, status: 'none', score: 0, attempts: 0, lastUpdate: new Date().toISOString() };
                state.view = 'dashboard';
                render();
                return;
            }

            try {
                const userRef = doc(state.db, 'artifacts', appId, 'public', 'data', 'results', name);
                const snap = await getDoc(userRef);

                if(snap.exists()) {
                    state.user = snap.data();
                    if(state.user.status === 'passed') {
                        state.view = 'result';
                    } else {
                        state.view = 'dashboard';
                    }
                } else {
                    state.user = { name, status: 'none', score: 0, attempts: 0, lastUpdate: new Date().toISOString() };
                    state.view = 'dashboard';
                }
                render();
            } catch(e) {
                showAlert('오류', '로그인 처리 중 문제가 발생했습니다.');
            }
        }

        function renderDashboard() {
            const isBlocked = state.user.attempts >= 3 && state.user.status !== 'passed';
            content.innerHTML = `
                <div class="animate-slide space-y-6">
                    <div class="glass-card p-6 border border-blue-50">
                        <h3 class="font-bold text-lg mb-4">교육 대상자 정보</h3>
                        <div class="flex justify-between items-center py-2 border-b border-gray-50">
                            <span class="text-gray-500">성명</span>
                            <span class="font-bold">${state.user.name}</span>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-gray-50">
                            <span class="text-gray-500">응시 횟수</span>
                            <span class="font-bold text-orange-600">${state.user.attempts}/3 회</span>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-gray-500">현재 상태</span>
                            <span class="font-bold ${state.user.status === 'passed' ? 'text-green-600' : 'text-gray-400'}">
                                ${state.user.status === 'passed' ? '이수 완료' : '미이수'}
                            </span>
                        </div>
                    </div>

                    ${isBlocked ? `
                        <div class="bg-red-50 p-6 rounded-2xl border border-red-100 text-center">
                            <i class="fas fa-lock text-3xl text-red-500 mb-3"></i>
                            <p class="text-red-700 font-bold">응시 횟수 초과</p>
                            <p class="text-xs text-red-600 mt-2">3회 이상 과락으로 재교육이 불가합니다.<br>현장 안전관리자에게 문의하세요.</p>
                        </div>
                    ` : `
                        <div class="space-y-4">
                            <div class="bg-blue-50 p-5 rounded-2xl">
                                <h4 class="font-bold text-blue-900 mb-2"><i class="fas fa-info-circle mr-2"></i>안전평가 안내</h4>
                                <ul class="text-xs text-blue-800 space-y-2">
                                    <li>1. 총 10문항의 4지선다형 문제가 출제됩니다.</li>
                                    <li>2. 80점(8문제) 이상 획득 시 최종 합격입니다.</li>
                                    <li>3. 답안 선택 시 자동으로 다음 문제로 이동합니다.</li>
                                    <li>4. 이전 버튼을 통해 이미 푼 문제를 수정할 수 있습니다.</li>
                                </ul>
                            </div>
                            <button id="startQuizBtn" class="w-full py-4 rounded-xl text-white font-bold btn-primary shadow-xl">
                                평가 응시 시작
                            </button>
                        </div>
                    `}
                </div>
            `;
            if(!isBlocked) document.getElementById('startQuizBtn').onclick = loadQuestions;
        }

        async function loadQuestions() {
            const pool = [
                {q: "삼성SDI 현장 내 보행 시 올바른 태도는?", a: ["스마트폰 사용", "주머니에 손 넣기", "지정된 통로 이용", "뛰어서 이동"], c: 2},
                {q: "보호구 착용의 기본 원칙으로 틀린 것은?", a: ["작업에 적합할 것", "상태가 양호할 것", "신체에 맞을 것", "더울 때는 미착용"], c: 3},
                {q: "화재 발생 시 가장 먼저 해야 할 조치는?", a: ["짐 챙기기", "주변에 알리고 대피", "엘리베이터 탑승", "원인 파악 대기"], c: 1},
                {q: "화학물질 취급 전 확인해야 할 서류는?", a: ["신문", "영수증", "MSDS(물질안전보건자료)", "작업일지"], c: 2},
                {q: "전기 기구 사용 중 과부하 방지를 위한 수칙은?", a: ["멀티탭 문어발 사용", "정격 용량 준수", "임의 개조", "젖은 손 조작"], c: 1},
                {q: "고소 작업(2m 이상) 시 필수 안전조치는?", a: ["안전모만 착용", "안전대 체결", "빨리 뛰기", "혼자 작업"], c: 1},
                {q: "지게차 주변 접근 시 주의사항은?", a: ["운전자와 눈맞춤 금지", "사각지대 접근 금지", "장비 밑에서 휴식", "지게차 뒤로 대피"], c: 1},
                {q: "정리정돈의 효과가 아닌 것은?", a: ["사고 예방", "능률 향상", "화재 예방", "먼지 발생 증가"], c: 3},
                {q: "사고 발생 시 보고 체계로 맞는 것은?", a: ["퇴근 후 보고", "나중에 보고", "즉시 상급자 보고", "보고 생략"], c: 2},
                {q: "밀폐공간 작업 시 가장 먼저 해야 할 것은?", a: ["장비 가동", "환기 및 가스 측정", "간식 섭취", "불 피우기"], c: 1}
            ];

            state.currentQuiz = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
            state.currentIndex = 0;
            state.answers = new Array(10).fill(null);
            state.view = 'quiz';
            render();
        }

        function renderQuiz() {
            const q = state.currentQuiz[state.currentIndex];
            const progress = ((state.currentIndex + 1) / 10) * 100;

            content.innerHTML = `
                <div class="animate-slide space-y-6 flex flex-col h-full">
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                        <div class="samsung-blue h-full transition-all duration-300" style="width: ${progress}%"></div>
                    </div>
                    
                    <div class="flex justify-between items-center text-xs font-bold text-gray-400">
                        <span>QUESTION ${state.currentIndex + 1} / 10</span>
                    </div>

                    <div class="flex-grow space-y-8">
                        <h3 class="text-xl font-bold text-gray-800 leading-snug">${q.q}</h3>
                        
                        <div class="space-y-3">
                            ${q.a.map((opt, i) => `
                                <div onclick="window.selectAnswer(${i})" 
                                     class="quiz-option p-4 rounded-2xl flex items-center space-x-3 ${state.answers[state.currentIndex] === i ? 'selected' : ''}">
                                    <span class="w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold text-sm ${state.answers[state.currentIndex] === i ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-400 border-gray-200'}">
                                        ${i + 1}
                                    </span>
                                    <span class="text-gray-700 font-medium">${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex space-x-3 pt-4 border-t border-gray-100">
                        <button id="backBtn" class="flex-1 py-4 rounded-xl font-bold bg-gray-100 text-gray-600 ${state.currentIndex === 0 ? 'opacity-30 pointer-events-none' : ''}">
                            이전 문항
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('backBtn').onclick = () => {
                if(state.currentIndex > 0) {
                    state.currentIndex--;
                    render();
                }
            };
        }

        window.selectAnswer = (idx) => {
            state.answers[state.currentIndex] = idx;
            render();

            setTimeout(() => {
                if(state.currentIndex < 9) {
                    state.currentIndex++;
                    render();
                } else {
                    completeQuiz();
                }
            }, 300);
        };

        async function completeQuiz() {
            let score = 0;
            state.currentQuiz.forEach((q, i) => {
                if(q.c === state.answers[i]) score += 10;
            });

            const isPassed = score >= 80;
            const updatedAttempts = (state.user.attempts || 0) + 1;
            
            const finalData = {
                ...state.user,
                score: isPassed ? score : (state.user.score || 0),
                status: isPassed ? 'passed' : 'failed',
                attempts: updatedAttempts,
                lastUpdate: new Date().toISOString()
            };

            if (state.db) {
                try {
                    const userRef = doc(state.db, 'artifacts', appId, 'public', 'data', 'results', state.user.name);
                    await setDoc(userRef, finalData);
                } catch(e) {
                    console.error("Save error:", e);
                }
            }
            
            state.user = finalData;
            state.view = 'result';
            render();
        }

        function renderResult() {
            const isPassed = state.user.status === 'passed';
            
            content.innerHTML = `
                <div class="animate-slide space-y-6 text-center h-full flex flex-col justify-center">
                    <div class="glass-card p-8 border-t-4 ${isPassed ? 'border-green-500' : 'border-red-500'}">
                        <div class="mb-4">
                            <i class="fas ${isPassed ? 'fa-check-circle text-green-500' : 'fa-times-circle text-red-500'} text-6xl"></i>
                        </div>
                        <h2 class="text-3xl font-black mb-1">${state.user.score}점</h2>
                        <p class="text-lg font-bold ${isPassed ? 'text-green-600' : 'text-red-500'} mb-6">
                            ${isPassed ? '최종 합격' : '과락 (재교육 대상)'}
                        </p>

                        ${isPassed ? `
                            <div id="qrcode" class="flex justify-center mb-6"></div>
                            <div class="text-left bg-gray-50 p-4 rounded-xl space-y-2">
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">S-SAFETY CERTIFICATE</p>
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-500">이수자</span>
                                    <span class="font-bold">${state.user.name}</span>
                                </div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-500">이수일</span>
                                    <span class="font-bold">${new Date(state.user.lastUpdate).toLocaleDateString()}</span>
                                </div>
                            </div>
                        ` : `
                            <div class="py-6 text-gray-500 text-sm">
                                <p>80점 이상 획득해야 이수 처리가 가능합니다.</p>
                                <p class="mt-1 font-bold">현재 응시 횟수: ${state.user.attempts}/3회</p>
                            </div>
                            ${state.user.attempts < 3 ? `
                                <button id="retryBtn" class="w-full py-4 rounded-xl text-white font-bold btn-primary">재교육 응시하기</button>
                            ` : '<p class="text-red-500 font-bold">재교육 가능 횟수 초과</p>'}
                        `}
                    </div>
                    
                    <button onclick="location.reload()" class="text-gray-400 text-sm font-medium hover:text-blue-600 transition-colors">
                        <i class="fas fa-home mr-1"></i> 메인 화면으로 이동
                    </button>
                </div>
            `;

            if(isPassed) {
                setTimeout(() => {
                    new QRCode(document.getElementById("qrcode"), {
                        text: `SDI-ULS-PASS:${state.user.name}:${state.user.lastUpdate}`,
                        width: 140,
                        height: 140,
                        colorDark: "#0047BA",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }, 100);
            } else if (state.user.attempts < 3) {
                const retryBtn = document.getElementById('retryBtn');
                if(retryBtn) retryBtn.onclick = () => { state.view = 'dashboard'; render(); };
            }
        }

        function renderAdmin() {
            content.innerHTML = `
                <div class="animate-slide space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-bold">관리자 패널</h2>
                        <button onclick="state.view='login'; render();" class="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-500">나가기</button>
                    </div>
                    <div id="adminContent" class="space-y-4">
                        <p class="text-center py-8 text-gray-400 text-sm">데이터를 불러오는 중입니다...</p>
                    </div>
                </div>
            `;
            loadAdminData();
        }

        async function loadAdminData() {
            const container = document.getElementById('adminContent');
            if (!state.db) {
                container.innerHTML = '<p class="text-center text-red-500 text-sm">Firebase 설정이 활성화되지 않아 데이터를 조회할 수 없습니다.</p>';
                return;
            }

            try {
                const resRef = collection(state.db, 'artifacts', appId, 'public', 'data', 'results');
                const snap = await getDocs(resRef);
                let list = [];
                snap.forEach(d => list.push(d.data()));
                
                if(list.length === 0) {
                    container.innerHTML = '<p class="text-center py-4 text-gray-400">응시 기록이 없습니다.</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                        <div class="max-h-64 overflow-y-auto text-[11px] divide-y">
                            ${list.map(item => `
                                <div class="flex justify-between py-2 items-center">
                                    <div><span class="font-bold text-gray-700">${item.name}</span></div>
                                    <div class="flex items-center space-x-2">
                                        <span class="${item.status === 'passed' ? 'text-blue-600' : 'text-red-400'} font-bold">${item.score}점</span>
                                        <span class="text-[9px] bg-gray-100 px-1 rounded">${item.attempts}회</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button id="exportCsv" class="w-full mt-4 py-3 bg-green-600 text-white rounded-xl font-bold text-xs">엑셀(CSV) 저장</button>
                    </div>
                `;

                document.getElementById('exportCsv').onclick = () => {
                    let csv = "성명,점수,상태,시도횟수,최종일시\n";
                    list.forEach(i => csv += `${i.name},${i.score},${i.status},${i.attempts},${i.lastUpdate}\n`);
                    const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Results_${new Date().toISOString().slice(0,10)}.csv`;
                    a.click();
                };
            } catch(e) { container.innerHTML = '조회 권한이 없거나 오류가 발생했습니다.'; }
        }

        function showAlert(title, msg) {
            const modal = document.getElementById('alertModal');
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            modal.classList.remove('hidden');
            document.getElementById('alertClose').onclick = () => modal.classList.add('hidden');
        }

        document.getElementById('adminBtn').onclick = () => {
            const pw = prompt('관리자 암호를 입력하세요.');
            if(pw === '1234') {
                state.view = 'admin';
                render();
            }
        };

        // 초기화 실행
        window.onload = initApp;
    </script>
</body>
</html>
