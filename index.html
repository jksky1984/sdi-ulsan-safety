<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Safety | 삼성SDI 안전교육 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.10/dist/easy.qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --samsung-blue: #0047BA; --samsung-dark: #002D72; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; margin: 0; }
        .samsung-blue { background-color: var(--samsung-blue); }
        .samsung-blue-text { color: var(--samsung-blue); }
        .btn-primary { background-color: var(--samsung-blue); color: white; transition: all 0.2s; border: none; }
        .btn-primary:active { transform: scale(0.98); background-color: var(--samsung-dark); }
        .quiz-option { border: 2px solid #e5e7eb; transition: all 0.2s; cursor: pointer; border-radius: 12px; }
        .quiz-option.selected { border-color: var(--samsung-blue); background-color: #eff6ff; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .tab-btn { border-bottom: 3px solid transparent; color: #9ca3af; transition: all 0.3s; background: none; border: none; cursor: pointer; }
        .tab-btn.active { border-bottom: 3px solid var(--samsung-blue); color: var(--samsung-blue); font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        #qrcode canvas, #qrcode img { margin: 0 auto; display: block; border: 4px solid white; border-radius: 8px; max-width: 100%; }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-xl overflow-hidden relative">
        
        <header class="samsung-blue text-white p-5 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-1 rounded-sm"><i class="fas fa-check-double samsung-blue-text text-sm"></i></div>
                <h1 class="font-bold text-lg tracking-tighter">S-SAFETY <span class="font-light opacity-70 ml-1">ULS-PLANT</span></h1>
            </div>
            <button id="adminBtn" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center border-none bg-transparent outline-none cursor-pointer">
                <i class="fas fa-cog opacity-50 text-xl text-white"></i>
            </button>
        </header>

        <main id="content" class="flex-grow p-6 overflow-y-auto">
            <div id="loading" class="flex flex-col items-center justify-center h-full space-y-4">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
                <p class="text-gray-400 text-sm font-medium">데이터베이스 연결 중...</p>
            </div>
        </main>

        <footer class="p-4 bg-gray-50 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Samsung SDI Ulsan Plant</p>
        </footer>

        <div id="adminPassModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-6">
            <div class="bg-white rounded-3xl w-full p-8 space-y-6 animate-in">
                <div class="text-center">
                    <h3 class="text-xl font-bold">관리자 인증</h3>
                    <p class="text-sm text-gray-500 mt-1">비밀번호를 입력해 주세요.</p>
                </div>
                <input type="password" id="adminPass" class="w-full p-4 bg-gray-100 rounded-2xl text-center text-2xl tracking-widest outline-none border-2 border-transparent focus:border-blue-600" placeholder="••••">
                <div class="flex space-x-2">
                    <button id="adminClose" class="flex-1 py-4 text-gray-400 font-bold bg-transparent border-none cursor-pointer">취소</button>
                    <button id="adminConfirm" class="flex-1 py-4 samsung-blue text-white rounded-2xl font-bold border-none cursor-pointer">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-sdi-app';

        const STATE = {
            view: 'login',
            user: null,
            db: null,
            auth: null,
            questions: [
                { q: "삼성SDI 울산 사업장 내 보행 중 스마트폰 사용은?", a: ["허용됨", "지정 장소만 가능", "절대 금지", "문자만 가능"], c: 2 },
                { q: "지게차 주변 보행 시 안전 거리 확보 기준은?", a: ["1M 이내", "운전석 뒤", "최소 2M 이상 및 시선 맞춤", "장비 바로 옆"], c: 2 },
                { q: "사업장 내 차량 제한 속도는 얼마입니까?", a: ["10km/h", "20km/h", "30km/h", "40km/h"], c: 1 },
                { q: "안전 통로가 아닌 곳으로 통행하는 행위는?", a: ["허용", "상황에 따라 허용", "절대 금지", "주의하며 통행"], c: 2 },
                { q: "작업 전 실시해야 하는 안전 점검은?", a: ["TBM", "장비 점검", "보호구 착용", "모두 포함"], c: 3 },
                { q: "화재 발생 시 가장 먼저 해야 할 행동은?", a: ["물 붓기", "대피 및 신고", "짐 챙기기", "엘리베이터 탑승"], c: 1 },
                { q: "보호구 미착용 시 조치는?", a: ["주의", "즉시 작업 중지 및 퇴거", "다음에 착용", "구두 경고"], c: 1 },
                { q: "사내 금연 구역에서의 흡연은?", a: ["허용", "과태료 부과 및 퇴거", "주의", "전자담배는 가능"], c: 1 },
                { q: "비상구 앞에 물건을 적재하는 행위는?", a: ["금지", "임시 허용", "상황에 따라 가능", "정리만 하면 됨"], c: 0 },
                { q: "전기 작업 시 차단기(LOTO) 설치는?", a: ["선택 사항", "필수 사항", "복잡하면 생략", "주의하며 작업"], c: 1 }
            ],
            currentQuiz: [],
            currentIndex: 0,
            answers: []
        };

        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                STATE.db = getFirestore(app);
                STATE.auth = getAuth(app);

                // Auth 실행 (필수)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(STATE.auth, __initial_auth_token);
                } else {
                    await signInAnonymously(STATE.auth);
                }
                
                // 문제 은행 로드 (실시간 반영 아님, 초기 1회 로드)
                const qRef = doc(STATE.db, 'artifacts', appId, 'public', 'data', 'config', 'questionBank');
                const qSnap = await getDoc(qRef);
                if(qSnap.exists() && qSnap.data().list) STATE.questions = qSnap.data().list;
                
                render();
            } catch (e) {
                console.error("Initialization Error:", e);
                render(); // 에러 발생 시에도 기본 렌더링 시도
            }
        }

        function render() {
            const content = document.getElementById('content');
            if (!content) return;
            content.innerHTML = '';
            
            switch(STATE.view) {
                case 'login': renderLogin(); break;
                case 'dashboard': renderDashboard(); break;
                case 'quiz': renderQuiz(); break;
                case 'result': renderResult(); break;
                case 'admin': renderAdmin(); break;
            }
        }

        function renderLogin() {
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col justify-center h-full space-y-8 animate-in">
                    <div class="text-center space-y-2">
                        <div class="inline-block p-4 rounded-3xl bg-blue-50 mb-4 text-4xl samsung-blue-text"><i class="fas fa-id-card"></i></div>
                        <h2 class="text-2xl font-bold text-gray-800">본인 인증</h2>
                        <p class="text-gray-400 text-sm">성명을 입력하여 교육 이수 상태를 확인하세요.</p>
                    </div>
                    <input type="text" id="nameInput" placeholder="성명 입력" class="w-full p-5 rounded-2xl border-2 border-gray-100 focus:border-blue-600 outline-none text-xl font-medium">
                    <button id="loginBtn" class="w-full py-5 rounded-2xl text-white font-bold btn-primary text-lg shadow-lg cursor-pointer">확인</button>
                </div>`;
            document.getElementById('loginBtn').onclick = handleLogin;
        }

        async function handleLogin() {
            const name = document.getElementById('nameInput').value.trim();
            if(!name) return;

            // 로딩 표시
            document.getElementById('loginBtn').innerHTML = '<i class="fas fa-spinner animate-spin"></i> 확인 중...';
            document.getElementById('loginBtn').disabled = true;

            try {
                // 정확한 경로: /artifacts/{appId}/public/data/users/{name}
                const userRef = doc(STATE.db, 'artifacts', appId, 'public', 'data', 'users', name);
                const snap = await getDoc(userRef);
                
                if(snap.exists()) {
                    STATE.user = snap.data();
                    // 이수 완료자는 즉시 결과 화면으로
                    if(STATE.user.status === 'passed') {
                        STATE.view = 'result';
                    } else {
                        STATE.view = 'dashboard';
                    }
                } else {
                    // 신규 사용자
                    STATE.user = { name, attempts: 0, status: 'none', score: 0 };
                    STATE.view = 'dashboard';
                }
                render();
            } catch (e) {
                console.error("Login error:", e);
                // 네트워크 오류 등으로 실패 시 데모 데이터로라도 진입 허용 (UX 고려)
                STATE.user = { name, attempts: 0, status: 'none', score: 0 };
                STATE.view = 'dashboard';
                render();
            }
        }

        function renderDashboard() {
            const blocked = STATE.user.attempts >= 3 && STATE.user.status !== 'passed';
            document.getElementById('content').innerHTML = `
                <div class="space-y-6 animate-in">
                    <div class="glass-card p-6 border border-gray-100">
                        <h3 class="font-bold text-lg mb-4 text-gray-700">나의 교육 정보</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between py-1 border-b border-gray-50"><span class="text-gray-400">성명</span><span class="font-bold">${STATE.user.name}</span></div>
                            <div class="flex justify-between py-1 border-b border-gray-50"><span class="text-gray-400">응시 횟수</span><span class="font-bold text-blue-600">${STATE.user.attempts} / 3회</span></div>
                            <div class="flex justify-between py-1"><span class="text-gray-400">이수 상태</span><span class="font-bold text-gray-700">${STATE.user.status === 'passed' ? '이수 완료' : '미이수'}</span></div>
                        </div>
                    </div>
                    ${blocked ? `
                        <div class="p-6 bg-red-50 rounded-3xl text-center border border-red-100">
                            <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-2"></i>
                            <p class="text-red-700 font-bold">3회 과락으로 응시 불가</p>
                        </div>
                    ` : `
                        <button id="startQuiz" class="w-full py-5 rounded-2xl btn-primary font-bold shadow-xl text-lg cursor-pointer">안전 평가 시작</button>
                    `}
                    <button onclick="location.reload()" class="w-full text-gray-400 text-sm underline bg-transparent border-none">다른 성명으로 로그인</button>
                </div>`;
            if(!blocked) document.getElementById('startQuiz').onclick = startQuiz;
        }

        function startQuiz() {
            const count = Math.min(STATE.questions.length, 10);
            STATE.currentQuiz = [...STATE.questions].sort(() => 0.5 - Math.random()).slice(0, count);
            STATE.currentIndex = 0;
            STATE.answers = [];
            STATE.view = 'quiz';
            render();
        }

        function renderQuiz() {
            const q = STATE.currentQuiz[STATE.currentIndex];
            const total = STATE.currentQuiz.length;
            const progress = ((STATE.currentIndex + 1) / total) * 100;

            document.getElementById('content').innerHTML = `
                <div class="space-y-6 animate-in h-full flex flex-col">
                    <div class="flex justify-between text-xs font-bold text-gray-400">
                        <span>문항 ${STATE.currentIndex + 1} / ${total}</span>
                        <span>${Math.round(progress)}%</span>
                    </div>
                    <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full samsung-blue transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 leading-tight">${q.q}</h3>
                    <div class="space-y-3 flex-grow">
                        ${q.a.map((opt, i) => `
                            <div onclick="window.selectAnswer(${i})" class="quiz-option p-4 flex items-center space-x-3 ${STATE.answers[STATE.currentIndex] === i ? 'selected' : ''}">
                                <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-bold text-gray-400 text-sm">${i+1}</span>
                                <span class="font-medium text-gray-600">${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        window.selectAnswer = (idx) => {
            STATE.answers[STATE.currentIndex] = idx;
            render();
            setTimeout(() => {
                if(STATE.currentIndex < STATE.currentQuiz.length - 1) { 
                    STATE.currentIndex++; 
                    render(); 
                }
                else finishQuiz();
            }, 300);
        };

        async function finishQuiz() {
            let correct = 0;
            STATE.currentQuiz.forEach((q, i) => { if(q.c === STATE.answers[i]) correct++; });
            const score = Math.round((correct / STATE.currentQuiz.length) * 100);
            const isPassed = score >= 80;
            const newAttempts = (STATE.user.attempts || 0) + 1;
            
            const resultData = {
                name: STATE.user.name,
                score: score,
                status: isPassed ? 'passed' : (newAttempts >= 3 ? 'blocked' : 'failed'),
                attempts: newAttempts,
                lastDate: new Date().toLocaleDateString()
            };

            // 서버에 저장
            try {
                const userRef = doc(STATE.db, 'artifacts', appId, 'public', 'data', 'users', STATE.user.name);
                await setDoc(userRef, resultData);
            } catch (e) {
                console.error("Save failed:", e);
            }

            STATE.user = resultData;
            STATE.view = 'result';
            render();
        }

        function renderResult() {
            const passed = STATE.user.status === 'passed';
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full space-y-6 animate-in">
                    <div class="glass-card p-8 w-full text-center border-t-8 ${passed ? 'border-green-500' : 'border-red-500'}">
                        <i class="fas ${passed ? 'fa-certificate text-green-500' : 'fa-times-circle text-red-500'} text-6xl mb-4"></i>
                        <h2 class="text-4xl font-black text-gray-800">${STATE.user.score}점</h2>
                        <p class="font-bold ${passed ? 'text-green-600' : 'text-red-500'} text-xl mb-6">${passed ? '최종 합격' : '과락 (재시험)'}</p>
                        ${passed ? `
                            <div class="bg-blue-50 p-6 rounded-2xl space-y-4 shadow-inner">
                                <p class="text-[10px] font-bold text-blue-800 uppercase tracking-widest">Digital Certificate</p>
                                <div id="qrcode" class="bg-white p-2 rounded-lg inline-block shadow-sm min-w-[150px] min-h-[150px]"></div>
                                <div class="text-[11px] text-gray-500 font-medium">성명: ${STATE.user.name}<br>일자: ${STATE.user.lastDate}</div>
                            </div>
                        ` : `
                            <div class="bg-red-50 p-4 rounded-xl"><p class="text-sm text-red-600">80점 이상 합격 (응시: ${STATE.user.attempts}/3)</p></div>
                            <button onclick="location.reload()" class="mt-6 w-full py-4 bg-gray-100 rounded-2xl font-bold border-none cursor-pointer">재도전하기</button>
                        `}
                    </div>
                    <button onclick="location.reload()" class="text-blue-600 font-bold underline bg-transparent border-none cursor-pointer">홈으로 가기</button>
                </div>`;
            
            if(passed) {
                setTimeout(() => {
                    const el = document.getElementById("qrcode");
                    if(!el || typeof QRCode === 'undefined') return;
                    el.innerHTML = "";
                    const qrData = `SDI|${STATE.user.name.replace(/\s/g,'')}|${STATE.user.lastDate.replace(/\.\s/g,'-')}`;
                    new QRCode(el, {
                        text: qrData,
                        width: 150,
                        height: 150,
                        colorDark: "#0047BA",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.L
                    });
                }, 400);
            }
        }

        function renderAdmin() {
            document.getElementById('content').innerHTML = `
                <div class="space-y-6 animate-in">
                    <div class="flex border-b">
                        <button onclick="window.setAdminTab('data')" id="tab-data" class="tab-btn flex-1 py-3 active">실시간 현황</button>
                        <button onclick="window.setAdminTab('questions')" id="tab-questions" class="tab-btn flex-1 py-3">문제 관리</button>
                    </div>
                    <div id="admin-sub-content"></div>
                </div>`;
            window.setAdminTab('data');
        }

        let adminUnsubscribe = null;

        window.setAdminTab = async (tab) => {
            const sub = document.getElementById('admin-sub-content');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const targetTab = document.getElementById(`tab-${tab}`);
            if(targetTab) targetTab.classList.add('active');

            if (adminUnsubscribe) {
                adminUnsubscribe();
                adminUnsubscribe = null;
            }

            if(tab === 'data') {
                sub.innerHTML = '<div class="text-center p-10"><i class="fas fa-circle-notch animate-spin text-blue-600"></i> 데이터 연결 중...</div>';
                
                const q = query(collection(STATE.db, 'artifacts', appId, 'public', 'data', 'users'));
                adminUnsubscribe = onSnapshot(q, (snapshot) => {
                    let list = [];
                    snapshot.forEach(d => list.push(d.data()));
                    
                    sub.innerHTML = `
                        <div class="space-y-2 max-h-[450px] overflow-y-auto">
                            ${list.length > 0 ? list.map(i => `
                                <div class="p-4 border rounded-2xl flex justify-between items-center bg-white shadow-sm">
                                    <div class="flex flex-col">
                                        <span class="font-bold text-gray-800">${i.name}</span>
                                        <span class="text-[10px] text-gray-400">${i.lastDate || '-'}</span>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-xs font-bold ${i.status === 'passed' ? 'text-blue-600' : 'text-red-500'}">
                                            ${i.status === 'passed' ? '합격' : '미이수'} (${i.score}점)
                                        </div>
                                        <div class="text-[10px] text-gray-400">시도: ${i.attempts}회</div>
                                    </div>
                                </div>
                            `).join('') : '<p class="text-center py-10 text-gray-400">데이터가 존재하지 않습니다.</p>'}
                        </div>`;
                }, (error) => {
                    sub.innerHTML = `<div class="p-4 bg-red-50 text-red-500 text-sm rounded-xl">실시간 연결 오류: ${error.message}</div>`;
                });
            } else {
                sub.innerHTML = `
                    <div class="space-y-4 animate-in">
                        <div class="p-8 border-2 border-dashed border-gray-200 rounded-3xl text-center cursor-pointer hover:bg-gray-50 transition-colors" onclick="document.getElementById('excelFile').click()">
                            <i class="fas fa-file-excel text-4xl text-green-500 mb-3"></i>
                            <p class="font-bold text-gray-700">엑셀 업로드</p>
                            <p class="text-[10px] text-gray-400 mt-1">질문/보기1/보기2/보기3/보기4/정답(1-4)</p>
                            <input type="file" id="excelFile" class="hidden" accept=".xlsx, .xls">
                        </div>
                        <div class="bg-blue-50 p-4 rounded-2xl text-center">
                            <p class="text-xs text-blue-700 font-medium">등록 문항 수: <span class="font-bold text-blue-900">${STATE.questions.length}</span></p>
                        </div>
                    </div>`;

                const excelInput = document.getElementById('excelFile');
                if(excelInput) {
                    excelInput.onchange = (e) => {
                        const file = e.target.files[0];
                        if(!file) return;
                        const reader = new FileReader();
                        reader.onload = async (evt) => {
                            const data = new Uint8Array(evt.target.result);
                            const wb = XLSX.read(data, {type: 'array'});
                            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                            let newList = [];
                            for(let i=0; i < rows.length; i += 6) {
                                if(!rows[i] || !rows[i][0]) continue;
                                newList.push({
                                    q: rows[i][0].toString(),
                                    a: [
                                        rows[i+1] ? rows[i+1][0].toString() : "",
                                        rows[i+2] ? rows[i+2][0].toString() : "",
                                        rows[i+3] ? rows[i+3][0].toString() : "",
                                        rows[i+4] ? rows[i+4][0].toString() : ""
                                    ],
                                    c: parseInt(rows[i+5] ? rows[i+5][0] : 1) - 1
                                });
                            }
                            if(newList.length > 0) {
                                STATE.questions = newList;
                                await setDoc(doc(STATE.db, 'artifacts', appId, 'public', 'data', 'config', 'questionBank'), { list: newList });
                                alert(`${newList.length}문항이 실제 서버에 반영되었습니다.`);
                                window.setAdminTab('questions');
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    };
                }
            }
        };

        const adminModal = document.getElementById('adminPassModal');
        document.getElementById('adminBtn').onclick = () => adminModal.classList.remove('hidden');
        document.getElementById('adminClose').onclick = () => adminModal.classList.add('hidden');
        document.getElementById('adminConfirm').onclick = () => {
            if(document.getElementById('adminPass').value === '1234') {
                adminModal.classList.add('hidden');
                STATE.view = 'admin';
                render();
            } else { alert('비밀번호가 일치하지 않습니다.'); }
        };

        window.onload = init;
    </script>
</body>
</html>
