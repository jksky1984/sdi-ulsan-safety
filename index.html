<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Safety | 삼성SDI 안전교육 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.10/dist/easy.qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --samsung-blue: #0047BA; --samsung-dark: #002D72; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; margin: 0; }
        .samsung-blue { background-color: var(--samsung-blue); }
        .samsung-blue-text { color: var(--samsung-blue); }
        .btn-primary { background-color: var(--samsung-blue); color: white; transition: all 0.2s; border: none; }
        .btn-primary:active { transform: scale(0.98); background-color: var(--samsung-dark); }
        .quiz-option { border: 2px solid #e5e7eb; transition: all 0.2s; cursor: pointer; border-radius: 12px; }
        .quiz-option.selected { border-color: var(--samsung-blue); background-color: #eff6ff; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        #qrcode canvas, #qrcode img { margin: 0 auto; display: block; border: 4px solid white; border-radius: 8px; max-width: 100%; }
        .loader { width: 48px; height: 48px; border: 5px solid var(--samsung-blue); border-bottom-color: transparent; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-xl overflow-hidden relative">
        
        <header class="samsung-blue text-white p-5 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center space-x-2">
                <div class="bg-white p-1 rounded-sm"><i class="fas fa-check-double samsung-blue-text text-sm"></i></div>
                <h1 class="font-bold text-lg tracking-tighter">S-SAFETY <span class="font-light opacity-70 ml-1">ULS-PLANT</span></h1>
            </div>
            <button id="adminBtn" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center border-none bg-transparent outline-none cursor-pointer">
                <i class="fas fa-cog opacity-50 text-xl text-white"></i>
            </button>
        </header>

        <main id="content" class="flex-grow p-6 overflow-y-auto">
            <div id="loading-state" class="flex flex-col items-center justify-center h-full space-y-6 text-center">
                <span class="loader" id="main-loader"></span>
                <div>
                    <p id="loading-msg" class="text-gray-800 font-bold">시스템 초기화 중...</p>
                    <p id="loading-detail" class="text-gray-400 text-xs mt-2 italic">Firebase 설정을 확인하고 있습니다.</p>
                </div>
                <div id="retry-container" class="hidden flex flex-col space-y-2">
                    <button id="retry-btn" class="px-6 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-lg">네트워크 다시 시도</button>
                    <button id="offline-btn" class="px-6 py-3 bg-gray-100 text-gray-600 rounded-xl text-sm font-bold">오프라인 모드로 시작</button>
                </div>
            </div>
        </main>

        <footer class="p-4 bg-gray-50 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Samsung SDI Ulsan Plant</p>
        </footer>

        <!-- Admin Auth Modal -->
        <div id="adminPassModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-6">
            <div class="bg-white rounded-3xl w-full p-8 space-y-6 animate-in">
                <div class="text-center">
                    <h3 class="text-xl font-bold">관리자 인증</h3>
                    <p class="text-sm text-gray-500 mt-1">비밀번호를 입력해 주세요.</p>
                </div>
                <input type="password" id="adminPass" class="w-full p-4 bg-gray-100 rounded-2xl text-center text-2xl tracking-widest outline-none border-2 border-transparent focus:border-blue-600" placeholder="••••">
                <div class="flex space-x-2">
                    <button id="adminClose" class="flex-1 py-4 text-gray-400 font-bold bg-transparent border-none cursor-pointer">취소</button>
                    <button id="adminConfirm" class="flex-1 py-4 samsung-blue text-white rounded-2xl font-bold border-none cursor-pointer">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const STATE = {
            view: 'loading',
            user: null,
            db: null,
            auth: null,
            appId: 'default-sdi-app',
            isOffline: false,
            questions: [
                { q: "삼성SDI 울산 사업장 내 보행 중 스마트폰 사용은?", a: ["허용됨", "지정 장소만 가능", "절대 금지", "문자만 가능"], c: 2 },
                { q: "지게차 주변 보행 시 안전 거리 확보 기준은?", a: ["1M 이내", "운전석 뒤", "최소 2M 이상 및 시선 맞춤", "장비 바로 옆"], c: 2 },
                { q: "사업장 내 차량 제한 속도는 얼마입니까?", a: ["10km/h", "20km/h", "30km/h", "40km/h"], c: 1 },
                { q: "안전 통로가 아닌 곳으로 통행하는 행위는?", a: ["허용", "상황에 따라 허용", "절대 금지", "주의하며 통행"], c: 2 },
                { q: "작업 전 실시해야 하는 안전 점검은?", a: ["TBM", "장비 점검", "보호구 착용", "모두 포함"], c: 3 }
            ],
            currentQuiz: [],
            currentIndex: 0,
            answers: [],
            allUsersData: []
        };

        const updateStatus = (msg, detail, showRetry = false) => {
            const msgEl = document.getElementById('loading-msg');
            const detailEl = document.getElementById('loading-detail');
            const retryBox = document.getElementById('retry-container');
            if (msgEl) msgEl.innerText = msg;
            if (detailEl) detailEl.innerText = detail;
            if (showRetry && retryBox) retryBox.classList.remove('hidden');
        };

        // 1. Firebase Config Waiter
        async function waitForConfig() {
            let attempts = 0;
            const maxAttempts = 50; // 약 10초

            return new Promise((resolve, reject) => {
                const check = () => {
                    const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                    if (configStr && configStr !== '{}') {
                        try {
                            const parsed = JSON.parse(configStr);
                            if (parsed.apiKey) return resolve(parsed);
                        } catch (e) {}
                    }
                    
                    attempts++;
                    if (attempts >= maxAttempts) {
                        reject(new Error("Firebase 설정 주입 시간 초과"));
                    } else {
                        setTimeout(check, 200);
                    }
                };
                check();
            });
        }

        async function init() {
            try {
                updateStatus("설정 확인 중...", "Firebase 구성을 불러오고 있습니다.");
                
                let config;
                try {
                    config = await waitForConfig();
                } catch (e) {
                    console.warn("Config injection failed. Attempting immediate start with offline option.");
                    updateStatus("연결 지연됨", "네트워크 환경을 확인하거나 오프라인 모드를 선택하세요.", true);
                    setupRetryButtons();
                    return;
                }

                updateStatus("데이터베이스 연결 중...", "서버와 보안 통신을 시작합니다.");
                
                const app = initializeApp(config);
                STATE.db = getFirestore(app);
                STATE.auth = getAuth(app);
                STATE.appId = typeof __app_id !== 'undefined' ? __app_id : 'default-sdi-app';

                // Auth
                updateStatus("사용자 인증 중...", "익명 계정으로 로그인 중입니다.");
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(STATE.auth, __initial_auth_token);
                } else {
                    await signInAnonymously(STATE.auth);
                }

                onAuthStateChanged(STATE.auth, (user) => {
                    if (user) {
                        updateStatus("동기화 완료", "환영합니다.");
                        STATE.view = 'login';
                        render();
                    } else {
                        throw new Error("인증 실패");
                    }
                });

            } catch (err) {
                console.error("Init error:", err);
                updateStatus("연결 실패", err.message, true);
                setupRetryButtons();
            }
        }

        function setupRetryButtons() {
            document.getElementById('retry-btn').onclick = () => window.location.reload();
            document.getElementById('offline-btn').onclick = () => {
                STATE.isOffline = true;
                STATE.view = 'login';
                render();
            };
        }

        // --- UI Rendering ---
        function render() {
            const content = document.getElementById('content');
            if (!content) return;
            content.innerHTML = '';
            
            switch(STATE.view) {
                case 'login': renderLogin(); break;
                case 'dashboard': renderDashboard(); break;
                case 'quiz': renderQuiz(); break;
                case 'result': renderResult(); break;
                case 'admin': renderAdmin(); break;
            }
        }

        function renderLogin() {
            content.innerHTML = `
                <div class="flex flex-col justify-center h-full space-y-8 animate-in">
                    <div class="text-center space-y-2">
                        <div class="inline-block p-4 rounded-3xl bg-blue-50 mb-4 text-4xl samsung-blue-text"><i class="fas fa-id-card"></i></div>
                        <h2 class="text-2xl font-bold text-gray-800">본인 인증</h2>
                        <p class="text-gray-400 text-sm">성명을 입력하여 교육을 시작하세요.</p>
                        ${STATE.isOffline ? '<p class="text-orange-500 text-[10px] font-bold">[오프라인 모드: 데이터가 저장되지 않음]</p>' : ''}
                    </div>
                    <input type="text" id="nameInput" placeholder="성명 입력" class="w-full p-5 rounded-2xl border-2 border-gray-100 focus:border-blue-600 outline-none text-xl font-medium">
                    <button id="loginBtn" class="w-full py-5 rounded-2xl text-white font-bold btn-primary text-lg shadow-lg cursor-pointer">입장하기</button>
                </div>`;
            document.getElementById('loginBtn').onclick = handleLogin;
        }

        async function handleLogin() {
            const name = document.getElementById('nameInput').value.trim();
            if(!name) return;
            
            if(STATE.isOffline) {
                STATE.user = { name, attempts: 0, status: 'none', score: 0 };
                STATE.view = 'dashboard';
                render();
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> 연결 중...';
            btn.disabled = true;

            try {
                const userRef = doc(STATE.db, 'artifacts', STATE.appId, 'public', 'data', 'users', name);
                const snap = await getDoc(userRef);
                if(snap.exists()) {
                    STATE.user = snap.data();
                    STATE.view = (STATE.user.status === 'passed') ? 'result' : 'dashboard';
                } else {
                    STATE.user = { name, attempts: 0, status: 'none', score: 0 };
                    STATE.view = 'dashboard';
                }
            } catch (e) {
                console.error(e);
                STATE.isOffline = true;
                STATE.user = { name, attempts: 0, status: 'none', score: 0 };
                STATE.view = 'dashboard';
            }
            render();
        }

        function renderDashboard() {
            const blocked = STATE.user.attempts >= 3 && STATE.user.status !== 'passed';
            content.innerHTML = `
                <div class="space-y-6 animate-in">
                    <div class="glass-card p-6 border border-gray-100">
                        <h3 class="font-bold text-lg mb-4 text-gray-700">교육 대시보드</h3>
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between py-1 border-b border-gray-50"><span class="text-gray-400">성명</span><span class="font-bold">${STATE.user.name}</span></div>
                            <div class="flex justify-between py-1 border-b border-gray-50"><span class="text-gray-400">기회</span><span class="font-bold text-blue-600">${STATE.user.attempts} / 3회</span></div>
                            <div class="flex justify-between py-1"><span class="text-gray-400">상태</span><span class="font-bold ${STATE.user.status === 'passed' ? 'text-green-500' : 'text-gray-700'}">${STATE.user.status === 'passed' ? '이수 완료' : '미이수'}</span></div>
                        </div>
                    </div>
                    ${blocked ? `
                        <div class="p-6 bg-red-50 rounded-3xl text-center border border-red-100">
                            <p class="text-red-700 font-bold">응시 횟수 초과로 제한됨</p>
                        </div>
                    ` : `
                        <button id="startQuiz" class="w-full py-5 rounded-2xl btn-primary font-bold shadow-xl text-lg cursor-pointer">안전 교육 및 평가 시작</button>
                    `}
                </div>`;
            if(!blocked) document.getElementById('startQuiz').onclick = startQuiz;
        }

        function startQuiz() {
            STATE.currentQuiz = [...STATE.questions].sort(() => 0.5 - Math.random()).slice(0, 5);
            STATE.currentIndex = 0;
            STATE.answers = [];
            STATE.view = 'quiz';
            render();
        }

        function renderQuiz() {
            const q = STATE.currentQuiz[STATE.currentIndex];
            const total = STATE.currentQuiz.length;
            const progress = ((STATE.currentIndex + 1) / total) * 100;

            content.innerHTML = `
                <div class="space-y-6 animate-in flex flex-col h-full">
                    <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full samsung-blue transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    <div class="space-y-2">
                        <span class="text-xs font-bold text-blue-600">질문 ${STATE.currentIndex + 1}</span>
                        <h3 class="text-xl font-bold text-gray-800 leading-tight">${q.q}</h3>
                    </div>
                    <div class="space-y-3 flex-grow">
                        ${q.a.map((opt, i) => `
                            <div onclick="window.selectAnswer(${i})" class="quiz-option p-5 flex items-center space-x-3">
                                <span class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-400 text-xs">${i+1}</span>
                                <span class="font-medium text-gray-700">${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        window.selectAnswer = (idx) => {
            STATE.answers[STATE.currentIndex] = idx;
            if(STATE.currentIndex < STATE.currentQuiz.length - 1) {
                STATE.currentIndex++;
                render();
            } else {
                finishQuiz();
            }
        };

        async function finishQuiz() {
            let correct = 0;
            STATE.currentQuiz.forEach((q, i) => { if(q.c === STATE.answers[i]) correct++; });
            const score = Math.round((correct / STATE.currentQuiz.length) * 100);
            const isPassed = score >= 80;
            const newAttempts = (STATE.user.attempts || 0) + 1;
            const dateStr = new Date().toLocaleDateString();

            const result = {
                name: STATE.user.name,
                score,
                status: isPassed ? 'passed' : (newAttempts >= 3 ? 'blocked' : 'failed'),
                attempts: newAttempts,
                lastDate: dateStr
            };

            if(!STATE.isOffline) {
                try {
                    await setDoc(doc(STATE.db, 'artifacts', STATE.appId, 'public', 'data', 'users', STATE.user.name), result);
                } catch(e) { console.error("Save error", e); }
            }

            STATE.user = result;
            STATE.view = 'result';
            render();
        }

        function renderResult() {
            const passed = STATE.user.status === 'passed';
            content.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full space-y-6 animate-in">
                    <div class="glass-card p-8 w-full text-center border-t-8 ${passed ? 'border-green-500' : 'border-red-500'}">
                        <h2 class="text-5xl font-black text-gray-800">${STATE.user.score}<span class="text-xl">점</span></h2>
                        <p class="font-bold text-xl mt-2 ${passed ? 'text-green-600' : 'text-red-500'}">${passed ? '교육 이수 완료' : '재응시 필요'}</p>
                        
                        ${passed ? `
                            <div class="mt-8 p-4 bg-gray-50 rounded-2xl flex flex-col items-center">
                                <div id="qrcode" class="mb-4"></div>
                                <p class="text-[10px] text-gray-400 font-bold tracking-widest">SAMSUNG SDI ULSAN PLANT</p>
                            </div>
                        ` : `
                            <p class="mt-4 text-sm text-gray-400 italic">기회: ${STATE.user.attempts}/3회</p>
                            <button onclick="location.reload()" class="mt-6 w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-600">다시 시도</button>
                        `}
                    </div>
                    <button onclick="location.reload()" class="text-blue-600 font-bold underline bg-transparent border-none cursor-pointer">홈으로</button>
                </div>`;
            
            if(passed) {
                setTimeout(() => {
                    new QRCode(document.getElementById("qrcode"), {
                        text: `SDI|${STATE.user.name}|${STATE.user.lastDate}`,
                        width: 140, height: 140, colorDark: "#0047BA"
                    });
                }, 300);
            }
        }

        // Admin
        function renderAdmin() {
            content.innerHTML = `<div class="p-10 text-center text-gray-400">관리자 기능을 로드 중입니다...</div>`;
            setTimeout(() => {
                content.innerHTML = `
                    <div class="space-y-4 animate-in">
                        <h3 class="font-bold">관리자 패널</h3>
                        <div class="p-4 bg-blue-50 rounded-2xl text-xs text-blue-800">실시간 데이터 연결 활성화됨</div>
                        <button onclick="location.reload()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold">로그아웃</button>
                    </div>`;
            }, 500);
        }

        const adminModal = document.getElementById('adminPassModal');
        document.getElementById('adminBtn').onclick = () => adminModal.classList.remove('hidden');
        document.getElementById('adminClose').onclick = () => adminModal.classList.add('hidden');
        document.getElementById('adminConfirm').onclick = () => {
            if(document.getElementById('adminPass').value === '1234') {
                adminModal.classList.add('hidden');
                STATE.view = 'admin';
                render();
            } else alert('비밀번호 오류');
        };

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
