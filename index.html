<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Safety Admin | 삼성SDI 안전교육 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.10/dist/easy.qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --samsung-blue: #0047BA; --samsung-dark: #002D72; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .samsung-blue { background-color: var(--samsung-blue); }
        .samsung-blue-text { color: var(--samsung-blue); }
        .btn-primary { background-color: var(--samsung-blue); color: white; border: none; transition: 0.2s; }
        .btn-primary:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .quiz-option { border: 2px solid #f1f5f9; cursor: pointer; transition: 0.2s; border-radius: 12px; }
        .quiz-option:hover { background-color: #eff6ff; }
        .quiz-option.selected { border-color: var(--samsung-blue); background-color: #eff6ff; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="max-w-xl mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">
        <!-- Header -->
        <header class="samsung-blue text-white p-5 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="location.reload()">
                <i class="fas fa-shield-alt"></i>
                <h1 class="font-bold text-lg tracking-tighter">S-SAFETY <span class="font-light opacity-70 ml-1">ADMIN</span></h1>
            </div>
            <div class="flex items-center space-x-3">
                <div id="sync-status" class="flex items-center space-x-1 bg-black/20 px-2 py-1 rounded-full">
                    <div class="w-1.5 h-1.5 rounded-full bg-orange-400"></div>
                    <span class="text-[10px]">OFFLINE</span>
                </div>
                <button id="adminBtn" class="text-white/60 hover:text-white"><i class="fas fa-cog"></i></button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-grow p-6 overflow-y-auto">
            <!-- Dynamic Content Load -->
            <div class="flex flex-col items-center justify-center h-full py-20">
                <i class="fas fa-circle-notch animate-spin text-blue-600 text-3xl"></i>
            </div>
        </main>

        <footer class="p-4 bg-gray-50 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Samsung SDI Ulsan Plant • Safety First</p>
        </footer>
    </div>

    <!-- Admin Password Modal -->
    <div id="adminModal" class="fixed inset-0 bg-black/70 z-[100] hidden items-center justify-center p-6">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 space-y-6 animate-up">
            <div class="text-center">
                <h3 class="text-xl font-bold">관리자 인증</h3>
                <p class="text-sm text-gray-500 mt-1">시스템 설정을 위해 암호를 입력하세요.</p>
            </div>
            <input type="password" id="adminPassInput" class="w-full p-4 bg-gray-100 rounded-2xl text-center text-2xl tracking-widest outline-none border-2 border-transparent focus:border-blue-600" placeholder="••••">
            <div class="flex space-x-3">
                <button id="adminClose" class="flex-1 py-4 text-gray-400 font-bold">취소</button>
                <button id="adminConfirm" class="flex-1 py-4 samsung-blue text-white rounded-2xl font-bold">확인</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // APP CONFIG & STATE
        const STATE = {
            view: 'login', // login, dashboard, quiz, result, admin
            user: null,
            appId: typeof __app_id !== 'undefined' ? __app_id : 'sdi-safety-v2',
            db: null,
            isConnected: false,
            // 기본 문제 (엑셀 업로드 전 대체제)
            questions: Array(20).fill().map((_, i) => ({
                q: `[샘플] 안전 수칙 문제 ${i+1}번 항목에 대한 설명으로 옳은 것은?`,
                a: ["매우 그렇다", "그렇다", "보통이다", "아니다"],
                c: 0
            })),
            currentQuiz: [],
            currentIndex: 0,
            answers: [],
            allUsers: []
        };

        // Initialize Firebase
        async function initApp() {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const config = JSON.parse(__firebase_config);
                    const app = initializeApp(config);
                    STATE.db = getFirestore(app);
                    const auth = getAuth(app);
                    await signInAnonymously(auth);
                    STATE.isConnected = true;
                    document.getElementById('sync-status').innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-green-400"></div><span class="text-[10px]">ONLINE</span>`;
                    
                    // 로드 시 문제 은행 동기화
                    const qSnap = await getDoc(doc(STATE.db, 'artifacts', STATE.appId, 'public', 'config', 'questions'));
                    if (qSnap.exists()) STATE.questions = qSnap.data().list;
                }
            } catch (e) {
                console.warn("Offline mode active");
            }
            render();
        }

        // --- RENDERERS ---

        function render() {
            const main = document.getElementById('main-content');
            main.className = "flex-grow p-6 overflow-y-auto";
            
            if (STATE.view === 'login') {
                main.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full space-y-10 animate-up">
                        <div class="text-center space-y-4">
                            <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto">
                                <i class="fas fa-user-check text-4xl samsung-blue-text"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold text-gray-800">삼성SDI 안전교육</h2>
                                <p class="text-gray-400 text-sm">성명을 입력하여 교육을 시작하세요</p>
                            </div>
                        </div>
                        <div class="w-full max-w-sm space-y-4">
                            <input type="text" id="userNameInput" placeholder="성명 입력" class="w-full p-5 rounded-2xl border-2 border-gray-100 focus:border-blue-600 outline-none text-xl font-bold text-center">
                            <button id="startBtn" class="w-full py-5 rounded-2xl btn-primary font-bold text-lg shadow-xl">입장하기</button>
                        </div>
                    </div>
                `;
                document.getElementById('startBtn').onclick = handleLogin;
                document.getElementById('userNameInput').onkeyup = (e) => e.key === 'Enter' && handleLogin();
            } 
            else if (STATE.view === 'dashboard') {
                const passed = STATE.user.status === 'passed';
                main.innerHTML = `
                    <div class="space-y-6 animate-up">
                        <div class="glass-card p-6 border-l-4 ${passed ? 'border-green-500' : 'border-blue-500'}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-xs text-gray-400 font-bold uppercase">Candidate</p>
                                    <h3 class="text-2xl font-bold text-gray-800">${STATE.user.name}</h3>
                                </div>
                                <span class="px-3 py-1 rounded-full text-[10px] font-bold ${passed ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                                    ${passed ? '이수 완료' : '교육 대상'}
                                </span>
                            </div>
                            <div class="mt-4 pt-4 border-t border-gray-50 grid grid-cols-2 gap-4">
                                <div><p class="text-[10px] text-gray-400">최근 응시 점수</p><p class="font-bold">${STATE.user.score || 0}점</p></div>
                                <div><p class="text-[10px] text-gray-400">남은 응시 횟수</p><p class="font-bold">${3 - (STATE.user.attempts || 0)}회</p></div>
                            </div>
                        </div>

                        ${passed ? `
                            <div class="glass-card p-8 flex flex-col items-center space-y-6">
                                <div class="text-center">
                                    <h4 class="font-bold text-gray-800">안전교육 이수증 (QR)</h4>
                                    <p class="text-xs text-gray-400">사업장 출입 시 보안 요원에게 제시하세요</p>
                                </div>
                                <div id="qrcode" class="p-2 bg-white border-4 border-blue-50 rounded-xl"></div>
                                <p class="text-[10px] text-gray-300 font-mono">${STATE.user.lastDate || ''} ISSUED</p>
                            </div>
                        ` : `
                            <div class="space-y-4">
                                <div class="bg-blue-50 p-5 rounded-2xl">
                                    <h4 class="font-bold text-blue-800 text-sm mb-1">평가 규칙</h4>
                                    <ul class="text-xs text-blue-600 space-y-1">
                                        <li>• 총 10문항이 무작위로 출제됩니다.</li>
                                        <li>• 80점(8문제) 이상 획득 시 이수 처리됩니다.</li>
                                        <li>• 불합격 시 최대 3회까지 재응시 가능합니다.</li>
                                    </ul>
                                </div>
                                <button id="takeQuizBtn" class="w-full py-5 rounded-2xl btn-primary font-bold text-lg shadow-xl">평가 시작 (10문항)</button>
                            </div>
                        `}
                    </div>
                `;
                if (passed) {
                    setTimeout(() => new QRCode(document.getElementById("qrcode"), {
                        text: `SDI-CERT|${STATE.user.name}|PASS|${STATE.user.lastDate}`,
                        width: 160, height: 160, colorDark: "#0047BA"
                    }), 100);
                } else {
                    document.getElementById('takeQuizBtn').onclick = startQuiz;
                }
            }
            else if (STATE.view === 'quiz') {
                const q = STATE.currentQuiz[STATE.currentIndex];
                const progress = ((STATE.currentIndex + 1) / 10) * 100;
                main.innerHTML = `
                    <div class="space-y-8 animate-up h-full flex flex-col">
                        <div class="space-y-2">
                            <div class="flex justify-between items-end">
                                <span class="text-xs font-bold text-blue-600 uppercase">Question ${STATE.currentIndex + 1}/10</span>
                                <span class="text-[10px] text-gray-400">${Math.round(progress)}%</span>
                            </div>
                            <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full samsung-blue transition-all" style="width:${progress}%"></div>
                            </div>
                        </div>
                        <div class="flex-grow space-y-6">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${q.q}</h3>
                            <div class="space-y-3">
                                ${q.a.map((txt, i) => `
                                    <div onclick="window.selectOpt(${i})" class="quiz-option p-5 flex items-center space-x-4">
                                        <div class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-[10px] font-bold text-gray-400">${i+1}</div>
                                        <span class="font-medium text-gray-700">${txt}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (STATE.view === 'result') {
                const isPassed = STATE.user.status === 'passed';
                main.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full space-y-6 animate-up py-10">
                        <div class="w-24 h-24 rounded-full flex items-center justify-center ${isPassed ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'}">
                            <i class="fas ${isPassed ? 'fa-check-circle' : 'fa-times-circle'} text-5xl"></i>
                        </div>
                        <div class="text-center">
                            <h2 class="text-4xl font-black text-gray-800">${STATE.user.score}<span class="text-xl ml-1">점</span></h2>
                            <p class="text-lg font-bold ${isPassed ? 'text-green-600' : 'text-red-600'} mt-2">${isPassed ? '최종 합격 (수료)' : '불합격 (재응시 필요)'}</p>
                        </div>
                        <div class="w-full glass-card p-6 space-y-3">
                            <div class="flex justify-between text-sm"><span class="text-gray-400">성명</span><span class="font-bold">${STATE.user.name}</span></div>
                            <div class="flex justify-between text-sm"><span class="text-gray-400">맞춘 문항</span><span class="font-bold">${STATE.user.score / 10} / 10</span></div>
                        </div>
                        <button onclick="STATE.view='dashboard';render();" class="w-full py-5 rounded-2xl btn-primary font-bold shadow-xl">확인</button>
                    </div>
                `;
            }
            else if (STATE.view === 'admin') {
                renderAdminView();
            }
        }

        // --- LOGIC FUNCTIONS ---

        async function handleLogin() {
            const name = document.getElementById('userNameInput').value.trim();
            if (!name) return;

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = "조회 중...";

            // 1. 유저 데이터 즉시 확인
            if (STATE.isConnected) {
                const userRef = doc(STATE.db, 'artifacts', STATE.appId, 'public', 'data', 'users', name);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    STATE.user = snap.data();
                } else {
                    STATE.user = { name, attempts: 0, status: 'none', score: 0, lastDate: '' };
                }
            } else {
                STATE.user = { name, attempts: 0, status: 'none', score: 0, lastDate: '' };
            }

            // 2. 이수 완료자라면 대시보드(QR)로, 아니면 대시보드(안내)로
            STATE.view = 'dashboard';
            render();
        }

        function startQuiz() {
            // 10문제 랜덤 추출
            STATE.currentQuiz = [...STATE.questions].sort(() => 0.5 - Math.random()).slice(0, 10);
            STATE.currentIndex = 0;
            STATE.answers = [];
            STATE.view = 'quiz';
            render();
        }

        window.selectOpt = async (idx) => {
            STATE.answers.push(idx);
            if (STATE.currentIndex < 9) {
                STATE.currentIndex++;
                render();
            } else {
                await processResult();
            }
        };

        async function processResult() {
            let correct = 0;
            STATE.currentQuiz.forEach((q, i) => {
                if (q.c === STATE.answers[i]) correct++;
            });
            const score = correct * 10;
            const isPassed = score >= 80;

            STATE.user.attempts = (STATE.user.attempts || 0) + 1;
            STATE.user.score = score;
            STATE.user.lastDate = new Date().toISOString().split('T')[0];
            
            // 기존에 통과한 적이 있다면 통과 유지, 아니면 이번 결과에 따라 업데이트
            if (STATE.user.status !== 'passed') {
                STATE.user.status = isPassed ? 'passed' : (STATE.user.attempts >= 3 ? 'blocked' : 'failed');
            }

            if (STATE.isConnected) {
                const userRef = doc(STATE.db, 'artifacts', STATE.appId, 'public', 'data', 'users', STATE.user.name);
                await setDoc(userRef, STATE.user);
            }

            STATE.view = 'result';
            render();
        }

        // --- ADMIN VIEW & EXCEL ---

        async function renderAdminView() {
            const main = document.getElementById('main-content');
            main.className = "flex-grow p-4 bg-gray-50 overflow-y-auto";
            
            // 데이터 로드
            if (STATE.isConnected && STATE.allUsers.length === 0) {
                const q = query(collection(STATE.db, 'artifacts', STATE.appId, 'public', 'data', 'users'));
                const snap = await getDocs(q);
                STATE.allUsers = snap.docs.map(d => d.data());
            }

            // 통계 계산
            const passedCount = STATE.allUsers.filter(u => u.status === 'passed').length;
            const totalAttempts = STATE.allUsers.length;

            main.innerHTML = `
                <div class="space-y-6 animate-up">
                    <div class="flex items-center justify-between">
                        <h2 class="text-xl font-bold">관리자 통계 모니터</h2>
                        <button onclick="location.reload()" class="text-xs bg-white px-3 py-1 rounded-full shadow-sm border font-bold">로그아웃</button>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass-card p-4">
                            <p class="text-[10px] text-gray-400 font-bold">총 응시 인원</p>
                            <p class="text-2xl font-black text-blue-600">${totalAttempts}명</p>
                        </div>
                        <div class="glass-card p-4">
                            <p class="text-[10px] text-gray-400 font-bold">최종 수료자</p>
                            <p class="text-2xl font-black text-green-500">${passedCount}명</p>
                        </div>
                    </div>

                    <!-- 엑셀 액션 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass-card p-4 space-y-3">
                            <p class="text-xs font-bold"><i class="fas fa-file-import mr-1"></i> 문제 업로드 (Excel)</p>
                            <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls">
                            <button onclick="document.getElementById('excelInput').click()" class="w-full py-2 bg-gray-100 text-[11px] font-bold rounded-lg border border-gray-200">파일 선택</button>
                            <p class="text-[9px] text-gray-400">컬럼: 문제, 보기1, 보기2, 보기3, 보기4, 정답(0-3)</p>
                        </div>
                        <div class="glass-card p-4 space-y-3">
                            <p class="text-xs font-bold"><i class="fas fa-file-export mr-1"></i> 데이터 내보내기</p>
                            <button id="downloadRaw" class="w-full py-2 bg-green-50 text-green-600 text-[11px] font-bold rounded-lg border border-green-200">RAW 엑셀 다운</button>
                        </div>
                    </div>

                    <!-- 리스트 섹션 -->
                    <div class="glass-card overflow-hidden">
                        <div class="p-4 border-b border-gray-50 bg-gray-50/50 flex justify-between">
                            <span class="text-xs font-bold text-gray-500">최근 응시자 내역</span>
                        </div>
                        <div class="max-h-60 overflow-y-auto">
                            <table class="w-full text-xs text-left">
                                <thead class="bg-gray-50 text-[10px] text-gray-400 uppercase">
                                    <tr>
                                        <th class="p-3">성명</th>
                                        <th class="p-3">점수</th>
                                        <th class="p-3">상태</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${STATE.allUsers.slice(-20).reverse().map(u => `
                                        <tr class="border-b border-gray-50">
                                            <td class="p-3 font-bold">${u.name}</td>
                                            <td class="p-3">${u.score}점</td>
                                            <td class="p-3"><span class="${u.status === 'passed' ? 'text-green-500' : 'text-orange-500'} font-bold">${u.status}</span></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            // 이벤트 바인딩
            document.getElementById('excelInput').onchange = handleExcelUpload;
            document.getElementById('downloadRaw').onclick = downloadExcel;
        }

        async function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);

                // 파싱: [문제, 보기1, 보기2, 보기3, 보기4, 정답]
                const newQuestions = rows.map(r => ({
                    q: r['문제'] || r['question'],
                    a: [r['보기1'], r['보기2'], r['보기3'], r['보기4']],
                    c: parseInt(r['정답'])
                })).filter(q => q.q && q.a[0]);

                if (newQuestions.length < 10) {
                    alert("최소 10문제 이상 업로드해야 합니다.");
                    return;
                }

                STATE.questions = newQuestions;
                if (STATE.isConnected) {
                    await setDoc(doc(STATE.db, 'artifacts', STATE.appId, 'public', 'config', 'questions'), { list: newQuestions });
                }
                alert(`${newQuestions.length}개의 문제가 업로드되었습니다.`);
            };
            reader.readAsBinaryString(file);
        }

        function downloadExcel() {
            if (STATE.allUsers.length === 0) return alert("데이터가 없습니다.");
            const worksheet = XLSX.utils.json_to_sheet(STATE.allUsers);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "SafetyData");
            XLSX.writeFile(workbook, `SDI_Safety_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // --- AUTH MODAL ---
        const modal = document.getElementById('adminModal');
        document.getElementById('adminBtn').onclick = () => modal.classList.remove('hidden');
        document.getElementById('adminClose').onclick = () => modal.classList.add('hidden');
        document.getElementById('adminConfirm').onclick = () => {
            if (document.getElementById('adminPassInput').value === '1234') {
                STATE.view = 'admin';
                modal.classList.add('hidden');
                render();
            } else {
                alert("비밀번호 불일치");
            }
        };

        window.onload = initApp;
    </script>
</body>
</html>
